<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadership Practice Quiz - 150 Questions | Digilians</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>:root{
  --font-head:'Sora',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --font-ar:'Noto Sans Arabic',sans-serif;
  --radius:14px;--radius-sm:8px;
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#f0f2f8;--surface3:#e8eaf5;
  --border:#dde1ec;--text:#1a1e2e;--text-dim:#4a5170;--text-muted:#7b80a0;
  --shadow:rgba(30,40,80,0.08);
  --c1-fg:#1a3a5c;--c1-bg:#ddeeff;--c1-mid:#5596cc;
  --c2-fg:#2d1a5c;--c2-bg:#ece6ff;--c2-mid:#7c5cc4;
  --c3-fg:#1a4a2e;--c3-bg:#d6f5e3;--c3-mid:#3aab65;
  --c4-fg:#5c2a00;--c4-bg:#fff0db;--c4-mid:#e08030;
  --c5-fg:#5c1a1a;--c5-bg:#fde8e8;--c5-mid:#d45050;
}
[data-theme="dark"]{
  --bg:#10121c;--surface:#181b2a;--surface2:#1e2235;--surface3:#252840;
  --border:#2a2e42;--text:#e8eaf5;--text-dim:#aab0cc;--text-muted:#6a7090;
  --shadow:rgba(0,0,0,0.35);
  --c1-fg:#90c8f8;--c1-bg:#0d1e30;--c1-mid:#3a7ab0;
  --c2-fg:#c8aaf8;--c2-bg:#180e30;--c2-mid:#6040a8;
  --c3-fg:#80e0a8;--c3-bg:#0a2018;--c3-mid:#288050;
  --c4-fg:#f8c878;--c4-bg:#201408;--c4-mid:#a05820;
  --c5-fg:#f89090;--c5-bg:#200808;--c5-mid:#a02828;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-head);background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;transition:background .3s,color .3s}
.site-header{background:linear-gradient(135deg,#0f1632 0%,#1a2560 40%,#2a3a8a 70%,#1a1a50 100%);padding:52px 32px 40px;text-align:center;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(80,120,255,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(120,60,200,.14) 0%,transparent 50%)}
.header-controls{position:absolute;top:20px;right:24px;display:flex;gap:8px;z-index:2}
.ctrl-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;font-family:var(--font-mono);cursor:pointer;transition:background .2s}
.ctrl-btn:hover{background:rgba(255,255,255,.22)}
.header-badge{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#c8d8ff;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:16px;font-family:var(--font-mono);position:relative;z-index:1}
.site-header h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.15;position:relative;z-index:1}
.site-header h1 span{background:linear-gradient(90deg,#80aaff,#c084fc,#60d9fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{color:#a0b4e0;margin-top:10px;font-size:14px;position:relative;z-index:1}
.score-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:8px 20px;margin-top:18px;font-size:13px;color:#c8d8ff;position:relative;z-index:1}
.score-pill strong{color:#fff;font-size:16px}
.page-wrap{max-width:860px;margin:0 auto;padding:32px 20px 80px}
.meta-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 24px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;box-shadow:0 2px 14px var(--shadow)}
.meta-item{display:flex;flex-direction:column;gap:2px}
.meta-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono)}
.meta-val{font-size:14px;font-weight:700;color:var(--text)}
.meta-div{width:1px;height:36px;background:var(--border)}
.prog-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;box-shadow:0 2px 10px var(--shadow)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px}
.prog-top .score-txt{font-weight:700;color:var(--c3-mid)}
.prog-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3aab65,#5596cc);transition:width .5s ease;width:0%}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.f-tab{padding:7px 16px;border-radius:20px;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:12px;font-weight:700;font-family:var(--font-head);cursor:pointer;transition:all .2s}
.f-tab:hover{border-color:var(--c2-mid);color:var(--text)}
.f-tab.active{background:var(--c2-mid);border-color:var(--c2-mid);color:#fff}
.q-group-label{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);padding:6px 0 12px;border-bottom:2px solid var(--border);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.q-group-label::before{content:'';width:28px;height:3px;background:linear-gradient(90deg,var(--c2-mid),var(--c1-mid));border-radius:2px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);transition:box-shadow .2s,border-color .2s}
.q-card:hover{box-shadow:0 4px 22px var(--shadow)}
.q-card.answered-correct{border-color:#3aab65}
.q-card.answered-wrong{border-color:#d45050}
.q-card-top{padding:20px 22px 16px;border-left:5px solid var(--border)}
.q-card.answered-correct .q-card-top{border-left-color:#3aab65}
.q-card.answered-wrong .q-card-top{border-left-color:#d45050}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.q-num-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;background:var(--surface2);color:var(--text-muted);padding:3px 10px;border-radius:12px;border:1px solid var(--border)}
.q-type-badge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:12px}
.badge-mcq{background:var(--c1-bg);color:var(--c1-fg)}
.badge-tf{background:var(--c2-bg);color:var(--c2-fg)}
.badge-scenario{background:var(--c4-bg);color:var(--c4-fg)}
.q-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--surface3);color:var(--text-muted);font-family:var(--font-mono)}
.q-text{font-size:15px;font-weight:600;line-height:1.6;color:var(--text)}
.result-icon{display:none;font-size:18px;margin-left:auto}
.q-card.answered-correct .result-icon,.q-card.answered-wrong .result-icon{display:block}
.q-options{padding:0 22px 18px;display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font-head);font-size:14px;text-align:left;cursor:pointer;transition:all .18s;width:100%}
.opt-btn:hover:not(:disabled){border-color:var(--c2-mid);background:var(--surface3);transform:translateX(3px)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct,.opt-btn.revealed-correct{background:#d6f5e3;border-color:#3aab65;color:#1a4a2e}
.opt-btn.wrong{background:#fde8e8;border-color:#d45050;color:#5c1a1a}
[data-theme="dark"] .opt-btn.correct,[data-theme="dark"] .opt-btn.revealed-correct{background:#0a2018;border-color:#3aab65;color:#80e0a8}
[data-theme="dark"] .opt-btn.wrong{background:#200808;border-color:#d45050;color:#f89090}
.opt-letter{font-family:var(--font-mono);font-weight:700;font-size:12px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--surface3);color:var(--c2-mid);flex-shrink:0;margin-top:1px;transition:background .18s,color .18s}
.opt-btn.correct .opt-letter,.opt-btn.revealed-correct .opt-letter{background:#3aab65;color:#fff}
.opt-btn.wrong .opt-letter{background:#d45050;color:#fff}
.tf-options{padding:0 22px 18px;display:flex;gap:10px}
.tf-btn{flex:1;padding:12px 20px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font-head);font-size:14px;font-weight:700;cursor:pointer;transition:all .18s}
.tf-btn:hover:not(:disabled){border-color:var(--c2-mid);background:var(--surface3)}
.tf-btn:disabled{cursor:default}
.tf-btn.correct,.tf-btn.revealed-correct{background:#d6f5e3;border-color:#3aab65;color:#1a4a2e}
.tf-btn.wrong{background:#fde8e8;border-color:#d45050;color:#5c1a1a}
[data-theme="dark"] .tf-btn.correct,[data-theme="dark"] .tf-btn.revealed-correct{background:#0a2018;border-color:#3aab65;color:#80e0a8}
[data-theme="dark"] .tf-btn.wrong{background:#200808;border-color:#d45050;color:#f89090}
.q-actions{padding:0 22px 18px;display:flex;gap:10px;align-items:center}
.show-ans-btn{padding:8px 20px;border-radius:8px;border:none;background:linear-gradient(90deg,var(--c2-mid),var(--c1-mid));color:#fff;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s}
.show-ans-btn:hover{opacity:.88;transform:translateY(-1px)}
/* Answer block with EN/AR toggle inside */
.q-answer{display:none;margin:0 22px 18px;border-radius:10px;overflow:hidden;border:1px solid var(--c3-mid)}
[data-theme="dark"] .q-answer{border-color:#288050}
.q-answer.open{display:block}
.ans-lang-bar{display:flex;border-bottom:1px solid var(--c3-mid);background:var(--c3-bg)}
[data-theme="dark"] .ans-lang-bar{background:#0a2018;border-color:#288050}
.ans-lang-btn{flex:1;padding:7px 0;border:none;background:none;font-size:12px;font-weight:700;cursor:pointer;color:var(--c3-fg);font-family:var(--font-mono);transition:background .15s}
[data-theme="dark"] .ans-lang-btn{color:#80e0a8}
.ans-lang-btn.active{background:var(--c3-mid);color:#fff}
.ans-body{padding:14px 16px;background:var(--c3-bg);font-size:13.5px;color:var(--c3-fg);line-height:1.7}
[data-theme="dark"] .ans-body{background:#0a2018;color:#80d8a0}
.ans-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-mono);margin-bottom:6px}
.ans-text-en{display:block}
.ans-text-ar{display:none;font-family:var(--font-ar);direction:rtl;text-align:right;line-height:2}
.scroll-top{position:fixed;bottom:28px;right:28px;background:var(--c2-mid);color:#fff;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:18px;box-shadow:0 4px 16px rgba(0,0,0,.28);display:none;align-items:center;justify-content:center;transition:transform .2s;z-index:200}
.scroll-top:hover{transform:translateY(-3px)}
.scroll-top.visible{display:flex}
@media(max-width:600px){.site-header{padding:60px 16px 32px}.meta-bar{flex-wrap:wrap;gap:12px}.header-controls{top:12px;right:12px;gap:5px}.ctrl-btn{padding:5px 10px;font-size:11px}}</style>
</head>
<body>
<header class="site-header">
  <div class="header-controls">
    <button class="ctrl-btn" id="theme-btn" onclick="toggleTheme()">Dark</button>
  </div>
  <div class="header-badge">Digilians &middot; Leadership Practice Quiz</div>
  <h1>Practice <span>Questions</span></h1>
  <p class="header-sub">150 Questions &bull; MCQ &bull; True/False &bull; Scenarios &bull; EN / AR Explanations</p>
  <div class="score-pill">
    Score: <strong id="hdr-score">0</strong> / <strong id="hdr-total">0</strong> answered
    &nbsp;&bull;&nbsp; <strong id="hdr-pct">-</strong>% correct
  </div>
</header>
<div class="page-wrap">
  <div class="meta-bar">
    <div class="meta-item"><span class="meta-label">Total</span><span class="meta-val">150 Questions</span></div>
    <div class="meta-div"></div>
    <div class="meta-item"><span class="meta-label">MCQ</span><span class="meta-val">89</span></div>
    <div class="meta-div"></div>
    <div class="meta-item"><span class="meta-label">True / False</span><span class="meta-val">43</span></div>
    <div class="meta-div"></div>
    <div class="meta-item"><span class="meta-label">Scenarios</span><span class="meta-val">18</span></div>
    <div class="meta-div"></div>
    <div class="meta-item"><span class="meta-label">Explanations</span><span class="meta-val">English + Arabic (inside each answer)</span></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-top">
      <span class="score-txt" id="prog-txt">0 / 150 answered</span>
      <span style="font-size:13px;color:var(--text-muted)" id="prog-correct-txt">0 correct</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  </div>
  <div class="filter-row" id="filter-row">
    <button class="f-tab active" onclick="filterQ('all',this)">All (150)</button>
    <button class="f-tab" onclick="filterQ('mcq',this)">MCQ</button>
    <button class="f-tab" onclick="filterQ('tf',this)">True / False</button>
    <button class="f-tab" onclick="filterQ('scenario',this)">Scenarios</button>
  </div>
  <div id="q-container"></div>
</div>
<button class="scroll-top" id="scrollBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>
<script>
var QS = [{"id": 1, "type": "mcq", "tag": "Foundation", "text": "Modern leadership requires", "opts": ["Agility, innovation, inclusivity", "Empathy and collaboration", "All the above", "Dynamic, human-centered approach"], "ans": 2, "exp": "Modern leadership is not one single trait. It requires agility and innovation to adapt, empathy and collaboration to work with people, AND a dynamic human-centered approach. All listed options are part of modern leadership.", "ar_exp": "القيادة الحديثة ليست سمة واحدة. تتطلب الرشاقة والابتكار للتكيف، والتعاطف والتعاون للعمل مع الناس، ونهجا ديناميكيا يمحور الانسان. جميع الخيارات المذكورة هي جزء من القيادة الحديثة."}, {"id": 2, "type": "mcq", "tag": "Foundation", "text": "Leadership is the ability to", "opts": ["Give directions and commands", "Use formal power to motivate people", "Plan and achieve tasks", "Inspire, guide and influence others to achieve goals"], "ans": 3, "exp": "Leadership is defined as inspiring, guiding and influencing others toward achieving goals. It is NOT about commands or formal authority - those are management behaviors.", "ar_exp": "القيادة تعني الهام الاخرين وتوجيههم والتاثير فيهم لتحقيق الاهداف. هي ليست عن اصدار الاوامر او السلطة الرسمية - تلك سلوكيات ادارية."}, {"id": 3, "type": "mcq", "tag": "Foundation", "text": "One of the main differences between leadership and management is", "opts": ["Leadership focuses on authority while management focuses on influence", "Leadership focuses on vision while management focuses on execution", "Leadership focuses on work while management focuses on people", "Leadership focuses on stability while management focuses on inspiring people"], "ans": 1, "exp": "Leaders focus on VISION - direction, inspiration, long-term thinking. Managers focus on EXECUTION - processes, tasks, short-term delivery. Leaders ask where are we going, managers ask how do we get there today.", "ar_exp": "القادة يركزون على الرؤية والاتجاه والتفكير بعيد المدى. المدراء يركزون على التنفيذ والعمليات والتسليم اليومي. القائد يسال: الى اين نذهب؟ والمدير يسال: كيف نصل اليوم؟"}, {"id": 4, "type": "tf", "tag": "Foundation", "text": "You must have a formal title or position to be considered a leader.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Leadership is about influence, not title. You can lead without any formal authority by taking initiative, modeling desired behaviors, and influencing others through credibility and relationships.", "ar_exp": "خطا. القيادة تعتمد على التاثير وليس المسمى الوظيفي. يمكنك القيادة دون اي صلاحية رسمية من خلال المبادرة ونمذجة السلوكيات المطلوبة والتاثير عبر المصداقية والعلاقات."}, {"id": 5, "type": "mcq", "tag": "Foundation", "text": "Which of the following best describes self-leadership?", "opts": ["Managing others effectively", "Goal setting, positive self-talk and self-discipline", "Following orders from senior management", "Having a title to be able to motivate oneself"], "ans": 1, "exp": "Self-leadership means leading yourself first. It requires goal setting, positive self-talk to manage your mindset, and self-discipline to act regardless of how you feel. It does NOT require a title.", "ar_exp": "القيادة الذاتية تعني قيادة نفسك اولا. تتطلب تحديد الاهداف والحديث الايجابي مع النفس والانضباط الذاتي للتصرف بغض النظر عن مشاعرك. لا تتطلب لقبا."}, {"id": 6, "type": "tf", "tag": "Resilience", "text": "When leaders bounce back from failures quickly, this is called resilience.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Resilience is the ability to recover quickly from setbacks and failures. It is a core leadership trait - resilient leaders treat failures as learning experiences and move forward rather than being paralyzed by them.", "ar_exp": "صحيح. المرونة هي القدرة على التعافي السريع من الانتكاسات والفشل. يعامل القادة المرنون الفشل كتجارب تعلم ويمضون قدما."}, {"id": 7, "type": "mcq", "tag": "Foundation", "text": "What does it mean to lead without authority?", "opts": ["Using your job title to get people to follow you", "Influencing and motivating others without a formal management position", "Delegating tasks to team members below you", "Avoiding decisions that require senior approval"], "ans": 1, "exp": "Leading without authority means influencing and motivating others based on relationships, credibility, communication, and initiative - without relying on a formal position or title.", "ar_exp": "القيادة بدون سلطة تعني التاثير والتحفيز بناء على العلاقات والمصداقية والتواصل والمبادرة، دون الاعتماد على المنصب الرسمي."}, {"id": 8, "type": "mcq", "tag": "Foundation", "text": "Three behaviors to lead without authority are:", "opts": ["Influencing through position, ignoring gaps, using facilitation skills", "A and B only", "Taking initiative, ownership, modeling desired behaviors", "Facilitating, being a source of positivity, encouraging collaboration"], "ans": 1, "exp": "The behaviors to lead without authority include influencing through relationships and credibility, and behaviors such as taking initiative and using facilitation skills. Answer A and B only aligns with the official quiz answer.", "ar_exp": "السلوكيات تشمل التاثير عبر العلاقات والمصداقية، وسلوكيات مثل اخذ المبادرة واستخدام مهارات التيسير. الاجابة ا وب فقط تتوافق مع الاجابة الرسمية للاختبار."}, {"id": 9, "type": "tf", "tag": "Foundation", "text": "A manager who focuses only on controlling tasks and systems with no concern for people's growth is also a great leader.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Management and leadership are different. A manager focused only on tasks and control is not necessarily a leader. Leadership requires inspiring, developing people, and creating vision - not just task control.", "ar_exp": "خطا. الادارة والقيادة مختلفتان. المدير الذي يركز فقط على المهام والسيطرة ليس بالضرورة قائدا. القيادة تتطلب الالهام وتطوير الناس وخلق الرؤية."}, {"id": 10, "type": "mcq", "tag": "Foundation", "text": "Which of the following is a key trait of an effective modern leader?", "opts": ["Strict adherence to hierarchy", "Adaptability and empathy", "Focusing only on results", "Avoiding conflict at all costs"], "ans": 1, "exp": "Modern leadership requires adaptability and empathy. These are the human-centered qualities that define modern leadership.", "ar_exp": "القيادة الحديثة تتطلب القدرة على التكيف والتعاطف. هذه هي الصفات الانسانية التي تحدد القيادة الحديثة."}, {"id": 11, "type": "tf", "tag": "Mindset", "text": "Leaders who adopt the Not yet mindset demonstrate a Growth mindset.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. The Not yet mindset is a hallmark of the Growth mindset. Instead of saying I cannot do this, a Growth mindset person says I have not mastered this yet. It treats challenges as learning opportunities.", "ar_exp": "صحيح. عقلية 'ليس بعد' هي علامة على العقلية النامية. بدلا من قول 'لا استطيع فعل هذا'، يقول الشخص ذو العقلية النامية 'لم اتقن هذا بعد'."}, {"id": 12, "type": "tf", "tag": "Mindset", "text": "People who ignore feedback or get defensive when receiving it demonstrate a Fixed mindset.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. A Fixed mindset causes people to see feedback as a threat to their intelligence, so they ignore it or become defensive. A Growth mindset person welcomes feedback as useful data for improvement.", "ar_exp": "صحيح. العقلية الثابتة تجعل الناس يرون التغذية الراجعة كتهديد لذكائهم فيتجاهلونها او يصبحون دفاعيين. الشخص ذو العقلية النامية يرحب بالتغذية الراجعة كبيانات مفيدة للتحسين."}, {"id": 13, "type": "tf", "tag": "Mindset", "text": "Leaders who admit that they do not know something and ask questions demonstrate a Growth mindset.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Admitting ignorance and asking questions is a hallmark of the Growth mindset. A Fixed mindset leader would avoid admitting ignorance to protect their image.", "ar_exp": "صحيح. الاعتراف بالجهل وطرح الاسئلة هو علامة على العقلية النامية. القائد ذو العقلية الثابتة سيتجنب الاعتراف بالجهل لحماية صورته."}, {"id": 14, "type": "mcq", "tag": "Mindset", "text": "A leader who believes intelligence and talent are fixed traits that cannot change is demonstrating a", "opts": ["Growth mindset", "Visionary mindset", "Fixed mindset", "Resilient mindset"], "ans": 2, "exp": "A Fixed mindset is the belief that intelligence and talent are static traits that cannot be developed. This leads to avoiding challenges, giving up easily, and feeling threatened by others' success.", "ar_exp": "العقلية الثابتة هي الاعتقاد بان الذكاء والموهبة صفات ثابتة لا يمكن تطويرها. يؤدي هذا الى تجنب التحديات والاستسلام السهل والشعور بالتهديد من نجاح الاخرين."}, {"id": 15, "type": "mcq", "tag": "Mindset", "text": "Which behavior is most associated with a Growth mindset leader?", "opts": ["Avoiding difficult tasks to prevent failure", "Blaming others when a project fails", "Seeking feedback and using it to improve", "Believing effort is pointless if you lack natural talent"], "ans": 2, "exp": "Seeking feedback and using it to improve is the defining behavior of a Growth mindset. Growth mindset leaders believe abilities can be developed through dedication, learning, and hard work.", "ar_exp": "البحث عن التغذية الراجعة واستخدامها للتحسين هو السلوك المميز للعقلية النامية. يؤمن القادة ذوو العقلية النامية بان القدرات يمكن تطويرها من خلال التفاني والتعلم."}, {"id": 16, "type": "tf", "tag": "Mindset", "text": "A growth mindset leader believes that effort and dedication can develop intelligence and skills over time.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. The core of Growth mindset is the belief that abilities can be developed through effort, good strategies, and input from others. Intelligence is not fixed.", "ar_exp": "صحيح. جوهر العقلية النامية هو الاعتقاد بان القدرات يمكن تطويرها من خلال الجهد والاستراتيجيات الجيدة والمدخلات من الاخرين."}, {"id": 17, "type": "mcq", "tag": "Mindset", "text": "When a team member fails at a task, a Growth mindset leader would most likely:", "opts": ["Remove the person from the team immediately", "Use the failure as a learning and coaching opportunity", "Ignore the failure to avoid discouraging the team", "Document the failure for the annual performance review"], "ans": 1, "exp": "A Growth mindset leader treats failure as data for learning. They would coach the team member, understand what went wrong, and use it as an opportunity for development - not punishment.", "ar_exp": "القائد ذو العقلية النامية يعامل الفشل كبيانات للتعلم. يتدرب على عضو الفريق، ويفهم ما حدث، ويستخدم الفشل كفرصة للتطوير وليس للعقاب."}, {"id": 18, "type": "tf", "tag": "Mindset", "text": "Fixed mindset leaders tend to avoid challenges because they fear exposing their limitations.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Fixed mindset people avoid challenges because they believe failure reveals a permanent lack of ability. They prefer to stay in their comfort zone where they are already proven.", "ar_exp": "صحيح. يتجنب اصحاب العقلية الثابتة التحديات لانهم يعتقدون ان الفشل يكشف عن نقص دائم في القدرة. يفضلون البقاء في منطقة الراحة."}, {"id": 19, "type": "mcq", "tag": "Situational Leadership", "text": "What are the two primary factors considered in Situational Leadership when determining the appropriate style?", "opts": ["Personal preferences and team member's age", "Task complexity and team member's confidence and commitment level", "Team member's gender and communication style", "Organizational hierarchy and team member's skills"], "ans": 1, "exp": "Situational Leadership by Hersey and Blanchard is based on two factors: the task requirements and the team member's competence AND commitment for that specific task.", "ar_exp": "القيادة الظرفية لهيرسي وبلانشارد تعتمد على عاملين: متطلبات المهمة وكفاءة الفرد (المهارة) والتزامه (الدافعية والثقة) لتلك المهمة تحديدا."}, {"id": 20, "type": "mcq", "tag": "Situational Leadership", "text": "In the Situational Leadership model, which leadership style involves a high level of direction and low level of support?", "opts": ["S4: Delegating", "S3: Supporting", "S1: Directing", "S2: Coaching"], "ans": 2, "exp": "S1 Directing = HIGH task direction + LOW relationship support. Used for D1 employees who are new or inexperienced and need clear instructions.", "ar_exp": "S1 التوجيه = سلوك مهمة عال + سلوك دعم منخفض. يستخدم للموظفين D1 الجدد او عديمي الخبرة الذين يحتاجون الى تعليمات واضحة."}, {"id": 21, "type": "mcq", "tag": "Situational Leadership", "text": "When a team member has moderate competence but low confidence in a task, which Situational Leadership style is most appropriate?", "opts": ["S2: Coaching", "S4: Delegating", "S1: Directing", "S3: Supporting"], "ans": 0, "exp": "Moderate competence plus low confidence = D2. The matching style is S2 Coaching - providing both high task direction AND high support to build skill and confidence simultaneously.", "ar_exp": "الكفاءة المتوسطة + الثقة المنخفضة = D2. الاسلوب المناسب هو S2 التدريب - توفير توجيه عال للمهمة ودعم عال لبناء المهارة والثقة في ان واحد."}, {"id": 22, "type": "mcq", "tag": "Situational Leadership", "text": "A follower who is able but unwilling or insecure requires which leadership style?", "opts": ["S1: Directing", "S2: Coaching", "S3: Supporting", "S4: Delegating"], "ans": 2, "exp": "Able but unwilling or insecure = D3 (high competence, variable or low commitment). The matching style is S3 Supporting - high relationship support and low task direction to rebuild confidence and motivation.", "ar_exp": "القادر لكنه غير راغب او غير واثق = D3 (كفاءة عالية، التزام متغير او منخفض). الاسلوب المناسب هو S3 الدعم - دعم علاقاتي عال وتوجيه مهام منخفض لاعادة بناء الثقة والدافعية."}, {"id": 23, "type": "scenario", "tag": "Situational Leadership", "text": "Scenario: Mostafa is a software engineer with 3 years at the company. His skills are solid, but recently he has been unmotivated and missing deadlines. His manager started giving him more freedom to manage his time. Did the manager use the right leadership style?", "opts": ["No", "Yes"], "ans": 0, "exp": "NO. Mostafa is at D3 - high competence but currently low commitment/motivation. The correct style is S3 Supporting which provides HIGH support to re-engage motivation. Giving MORE freedom (S4 Delegating) when motivation is already low makes the problem worse.", "ar_exp": "لا. مصطفى في مستوى D3 - كفاءة عالية لكن التزام منخفض حاليا. الاسلوب الصحيح هو S3 الدعم الذي يوفر دعما عاليا لاعادة اشعال الدافعية. اعطاؤه مزيدا من الحرية (S4) حين تكون الدافعية منخفضة يفاقم المشكلة."}, {"id": 24, "type": "mcq", "tag": "Situational Leadership", "text": "S4: Delegating is most appropriate for which type of team member?", "opts": ["New and enthusiastic with no experience", "Skilled but currently unmotivated", "Somewhat capable but lacks confidence", "Highly skilled, experienced, and self-motivated"], "ans": 3, "exp": "S4 Delegating is used for D4 employees - those who are highly competent AND highly committed. They are self-motivated and trusted to work independently with minimal direction or support.", "ar_exp": "S4 التفويض يستخدم للموظفين D4 - اصحاب الكفاءة العالية والالتزام العالي. هم متحفزون ذاتيا ويوثق بهم للعمل باستقلالية مع الحد الادنى من التوجيه."}, {"id": 25, "type": "tf", "tag": "Situational Leadership", "text": "In Situational Leadership, a person's development level is fixed across all tasks in their role.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Development levels are TASK-SPECIFIC. The same person can be D4 on their core skills but D1 on a brand new task they have never done before. Always assess the level per task, not per person overall.", "ar_exp": "خطا. مستويات التطور خاصة بالمهمة. نفس الشخص قد يكون D4 في مهاراته الاساسية لكن D1 في مهمة جديدة لم يجربها من قبل. قيّم دائما المستوى لكل مهمة وليس للشخص ككل."}, {"id": 26, "type": "mcq", "tag": "Situational Leadership", "text": "S2 Coaching in Situational Leadership is characterized by:", "opts": ["Low task, high support", "High task, low support", "High task, high support", "Low task, low support"], "ans": 2, "exp": "S2 Coaching = HIGH task behavior + HIGH relationship behavior. The leader explains decisions AND encourages buy-in. It is used for D2 employees who have some skill but need both direction and emotional support.", "ar_exp": "S2 التدريب = سلوك مهمة عال + سلوك علاقاتي عال. يشرح القائد القرارات ويشجع على الانخراط. يستخدم للموظفين D2 الذين لديهم بعض المهارة لكنهم يحتاجون توجيها ودعما عاطفيا."}, {"id": 27, "type": "scenario", "tag": "Situational Leadership", "text": "Scenario: A new intern joins your team this week. She is excited and eager to learn but has never done this type of work before. Which leadership style should you use?", "opts": ["S4: Delegating", "S3: Supporting", "S2: Coaching", "S1: Directing"], "ans": 3, "exp": "A new intern who is eager but inexperienced = D1. The correct style is S1 Directing - give clear specific instructions, close supervision, and step-by-step guidance.", "ar_exp": "المتدربة الجديدة المتحمسة لكن عديمة الخبرة = D1. الاسلوب الصحيح هو S1 التوجيه - تعليمات محددة وواضحة وارشاد خطوة بخطوة."}, {"id": 28, "type": "scenario", "tag": "Situational Leadership", "text": "Scenario: Your team member has been doing this job for 5 years and consistently exceeds targets. She is confident and motivated. Which style is best?", "opts": ["S1: Directing", "S2: Coaching", "S3: Supporting", "S4: Delegating"], "ans": 3, "exp": "5 years, exceeds targets, confident and motivated = D4. S4 Delegating is correct - assign the goal, trust her process, and check in only occasionally. Micromanaging a D4 would frustrate and demotivate them.", "ar_exp": "5 سنوات خبرة، تتجاوز الاهداف، واثقة ومحفزة = D4. S4 التفويض صحيح - حدد الهدف وثق في طريقتها. الادارة التفصيلية لـ D4 ستحبطها."}, {"id": 29, "type": "tf", "tag": "Situational Leadership", "text": "A leader who uses S1 Directing with a D4 employee is making the right choice.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Using S1 Directing (high control, constant supervision) with a D4 employee (highly skilled and motivated) is a mismatch. It feels like micromanagement and damages trust and motivation. D4 needs S4 Delegating.", "ar_exp": "خطا. استخدام S1 التوجيه مع موظف D4 هو عدم تطابق. يبدو كادارة تفصيلية ويضر بالثقة والدافعية. D4 يحتاج S4 التفويض."}, {"id": 30, "type": "mcq", "tag": "Situational Leadership", "text": "The Situational Leadership Model was developed by:", "opts": ["Daniel Goleman and Peter Drucker", "Paul Hersey and Ken Blanchard", "John Kotter and Warren Bennis", "Jim Collins and Patrick Lencioni"], "ans": 1, "exp": "The Situational Leadership Model was developed by Paul Hersey and Ken Blanchard. It is a practical, task-specific framework where leaders adapt their style S1-S4 to match the follower's development level D1-D4.", "ar_exp": "تم تطوير نموذج القيادة الظرفية من قبل بول هيرسي وكين بلانشارد. اطار عملي خاص بالمهام يكيف القائد اسلوبه S1-S4 ليتناسب مع مستوى تطور المتبع D1-D4."}, {"id": 31, "type": "mcq", "tag": "Goleman 6 Styles", "text": "Using Daniel Goleman's 6 leadership styles, which style is best used in crisis or emergency situations?", "opts": ["Coaching", "Commanding", "Visionary", "Affiliative"], "ans": 1, "exp": "The Commanding style is best in a crisis. Its phrase is Do what I tell you. It demands immediate compliance - exactly what is needed when there is no time for discussion. However, it is easily misused outside of true emergencies.", "ar_exp": "اسلوب الاوامر (القسري) هو الافضل في الازمات. عبارته: 'افعل ما اقوله'. يتطلب الامتثال الفوري. لكنه يساء استخدامه بسهولة خارج الطوارئ الحقيقية."}, {"id": 32, "type": "mcq", "tag": "Goleman 6 Styles", "text": "This leadership style promotes harmony within the team, connects people together, and values emotional needs. Which leadership style is that?", "opts": ["Affiliative", "Commanding", "Coaching", "Democratic"], "ans": 0, "exp": "This is the Affiliative style. Its phrase is People come first. It creates emotional bonds, promotes inclusion, resolves conflict, and values feelings. The core EI competency is empathy and communication.", "ar_exp": "هذا هو الاسلوب التلاحمي. عبارته: 'الناس اولا'. ينشئ روابط عاطفية، ويعزز الاندماج، ويحل النزاعات. الكفاءة العاطفية الاساسية: التعاطف والتواصل."}, {"id": 33, "type": "mcq", "tag": "Goleman 6 Styles", "text": "A key competence to use when using the visionary style is:", "opts": ["Self-discipline", "Self-confidence", "Self-control", "Self-awareness"], "ans": 1, "exp": "Self-confidence is the primary EI competency for Visionary leadership. A visionary leader must believe in their vision and communicate it convincingly. Without self-confidence, you cannot inspire others to follow a direction.", "ar_exp": "الثقة بالنفس هي كفاءة الذكاء العاطفي الاساسية للقيادة الرؤيوية. يجب ان يؤمن القائد الرؤيوي برؤيته ويوصلها باقناع. بدون الثقة بالنفس لا يمكنك الهام الاخرين."}, {"id": 34, "type": "mcq", "tag": "Goleman 6 Styles", "text": "Key competencies when using the commanding style are:", "opts": ["Empathy", "Self-control", "Decisiveness", "a and b only"], "ans": 3, "exp": "The Commanding style requires Empathy to know when to switch away from this style AND Self-control to stay composed under pressure and give clear directives. Both together, not just one alone.", "ar_exp": "اسلوب الاوامر يتطلب التعاطف (لمعرفة متى تتوقف عن هذا الاسلوب) والتحكم بالنفس (للبقاء هادئا تحت الضغط). كلاهما معا وليس واحدا فقط."}, {"id": 35, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: You are the team leader with an experienced motivated team facing a complex problem that needs a decision. The best leadership style to use is:", "opts": ["Affiliative", "Coaching", "Democratic", "Commanding"], "ans": 2, "exp": "Democratic leadership is ideal here. Your team is experienced and motivated. Complex problems benefit from diverse input. The Democratic style builds consensus and leverages the team's collective expertise.", "ar_exp": "القيادة الديمقراطية مثالية هنا. فريقك متمرس ومحفز. المشاكل المعقدة تستفيد من وجهات نظر متنوعة. الاسلوب الديمقراطي يبني الاجماع ويستثمر خبرة الفريق."}, {"id": 36, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: Your company announces a merger. Your team of 15 people are worried and unclear about their future roles. You have a mandatory meeting in an hour. Which style will you use?", "opts": ["Pacesetting style to ensure the team quickly adapts", "Commanding style to focus on applying new rules", "Visionary style to show long-term opportunities after the change", "Democratic style to share experiences in similar situations"], "ans": 2, "exp": "Visionary is the best choice when people are fearful about the future. The Visionary leader says Come with me and paints a motivating picture of long-term opportunities, reducing fear and building direction.", "ar_exp": "القيادة الرؤيوية (التحفيزية) هي الخيار الافضل حين يخاف الناس من المستقبل. القائد الرؤيوي يقول 'تعال معي' ويرسم صورة محفزة للفرص بعيدة المدى."}, {"id": 37, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: You have a team member who is talented but struggles with public speaking. He knows he needs development in this area. What is the best leadership style?", "opts": ["Coaching", "Democratic", "Affiliative", "Pacesetting"], "ans": 0, "exp": "The Coaching style is designed for long-term skill development. The team member has self-awareness about their gap and is willing to grow. Coaching provides ongoing feedback, stretch assignments, and development planning.", "ar_exp": "اسلوب التدريب مصمم لتطوير المهارات بعيدة المدى. عضو الفريق واعٍ بفجوته ومستعد للنمو. يوفر التدريب تغذية راجعة مستمرة ومهام تطويرية."}, {"id": 38, "type": "mcq", "tag": "Goleman 6 Styles", "text": "The Pacesetting style is best used when:", "opts": ["The team is new and needs direction", "You need to heal conflict in the team", "You need high-quality results quickly from a motivated skilled team", "A team member needs long-term development"], "ans": 2, "exp": "Pacesetting works best with highly skilled, already-motivated teams that need to deliver top performance quickly. Its phrase is Do as I do, now. It is counterproductive with low-skill or unmotivated teams.", "ar_exp": "اسلوب وضع الايقاع يعمل بشكل افضل مع فرق ماهرة وذات دافعية عالية تحتاج تحقيق اداء عال بسرعة. يضر بالفرق قليلة المهارة او المحبطة."}, {"id": 39, "type": "tf", "tag": "Goleman 6 Styles", "text": "The Coaching style (Goleman) can fail when used with an employee who is not interested in personal development.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Coaching requires a willing and motivated learner. If the employee does not want to grow or is not making effort, coaching will not work. In that case, Pacesetting or Commanding may be more appropriate.", "ar_exp": "صحيح. التدريب يتطلب متعلما راغبا ومحفزا. اذا كان الموظف لا يرغب في النمو او لا يبذل جهدا، فلن ينجح التدريب."}, {"id": 40, "type": "tf", "tag": "Goleman 6 Styles", "text": "According to Goleman, all 6 leadership styles have equally positive effects on team climate.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Goleman found that Coercive and Pacesetting can have NEGATIVE effects on team climate when overused. Authoritative, Affiliative, Democratic, and Coaching tend to be more consistently positive.", "ar_exp": "خطا. وجد غولمان ان اسلوبي الاوامر ووضع الايقاع يمكن ان يكون لهما تاثيرات سلبية على المناخ التنظيمي عند الافراط في استخدامهما."}, {"id": 41, "type": "mcq", "tag": "Goleman 6 Styles", "text": "The Affiliative leadership style should be used when:", "opts": ["A crisis requires immediate action", "There is team tension, broken trust, or a stressful period", "The team needs to set high performance standards", "The team is working on a simple routine task"], "ans": 1, "exp": "Affiliative is specifically recommended when there is team tension, conflict, or broken trust - or when the team needs emotional support through a stressful time. It heals and reconnects people.", "ar_exp": "يوصى بالاسلوب التلاحمي تحديدا عند وجود توترات في الفريق او انكسار الثقة. يشفي ويعيد التواصل بين الناس."}, {"id": 42, "type": "mcq", "tag": "Goleman 6 Styles", "text": "Which Goleman style has the key phrase Come with me?", "opts": ["Coaching", "Democratic", "Visionary (Authoritative)", "Affiliative"], "ans": 2, "exp": "Come with me is the signature phrase of the Visionary (Authoritative) style. The leader mobilizes people toward a vision by showing the destination and explaining why it matters.", "ar_exp": "'تعال معي' هي العبارة المميزة للقيادة الرؤيوية (التحفيزية). يحشد القائد الناس نحو رؤية بإظهار الوجهة وشرح سبب اهميتها."}, {"id": 43, "type": "tf", "tag": "Goleman 6 Styles", "text": "The Democratic leadership style is most effective in crisis situations that require fast decisions.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Democratic leadership is slow by nature - it requires gathering input and building consensus. In a crisis, Commanding or Directing is far more appropriate.", "ar_exp": "خطا. القيادة الديمقراطية بطيئة بطبيعتها اذ تتطلب جمع المدخلات وبناء الاجماع. في الازمات، الاوامر او التوجيه اكثر ملاءمة بكثير."}, {"id": 44, "type": "mcq", "tag": "Goleman 6 Styles", "text": "Which Goleman leadership style focuses on developing people for the long-term, even if it means sacrificing short-term performance?", "opts": ["Pacesetting", "Commanding", "Affiliative", "Coaching"], "ans": 3, "exp": "The Coaching style explicitly may trade short-term performance for long-term development. The coach assigns stretch tasks, provides ongoing feedback, and invests in the person's growth.", "ar_exp": "اسلوب التدريب قد يضحي صراحة بالاداء قصير المدى من اجل النمو بعيد المدى. يسند المدرب مهاما تطويرية ويوفر تغذية راجعة مستمرة."}, {"id": 45, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: You have been using a democratic style with your team. Everyone shared ideas but there is a disagreement. Your manager says a decision must be made within 5 minutes. What do you do?", "opts": ["Continue using democratic style to reach a decision", "Ask your manager to postpone", "Ask a team member to decide instead of you", "Make the decision as the leader and explain to the team why you chose this option"], "ans": 3, "exp": "When urgency hits, switch styles. You already gathered input. Now make the decision yourself and explain your reasoning. This maintains trust while meeting the deadline. Continuing to debate misses the deadline.", "ar_exp": "حين يضرب الالحاح، غير الاسلوب. جمعت المدخلات بالفعل. الان اتخذ القرار بنفسك وفسر مبرراتك. الاستمرار في النقاش يفوت الموعد النهائي."}, {"id": 46, "type": "mcq", "tag": "Conflict Handling", "text": "When leaders handle conflict, they should:", "opts": ["Consider emotions of all parties involved", "Be solution-oriented", "Address issues early enough", "Consider all the above"], "ans": 3, "exp": "ALL of the above is correct. Effective conflict handling requires: acknowledging everyone's emotions, staying solution-focused, and addressing issues early before they escalate.", "ar_exp": "جميع ما سبق صحيح. ادارة النزاعات الفعالة تتطلب: الاعتراف بمشاعر الجميع، والتركيز على الحلول بدلا من اللوم، ومعالجة المشكلات مبكرا."}, {"id": 47, "type": "scenario", "tag": "Conflict Handling", "text": "Scenario: A team member is complaining that they are assigned more tasks than others and feel overwhelmed and underappreciated. How should the leader handle this?", "opts": ["Reinforce their role as leader and that members should not complain", "Review task assignments objectively and reassign tasks if needed", "Ask the team to handle the situation together", "Give more appreciation to the team member who feels underappreciated"], "ans": 1, "exp": "Reviewing task assignments objectively and reassigning if needed addresses the ROOT CAUSE. Simply giving appreciation ignores the real problem. A good leader investigates fairness and takes corrective action.", "ar_exp": "مراجعة توزيع المهام بموضوعية وإعادة توزيعها اذا لزم الامر يعالج الجذر الحقيقي للمشكلة (اختلال توازن عبء العمل). مجرد تقديم التقدير يتجاهل المشكلة الحقيقية."}, {"id": 48, "type": "scenario", "tag": "Conflict Handling", "text": "Scenario: One team member consistently dominates conversations in meetings, causing others to feel unheard. How should the leader handle this?", "opts": ["Ask the team member in the meeting to give others a chance", "Give private feedback to the team member and set meeting norms", "Appreciate the team member's contribution in the meetings"], "ans": 1, "exp": "Private feedback plus setting meeting norms is correct. Calling someone out publicly embarrasses them and damages trust. Private feedback respects dignity while addressing the behavior. Setting norms prevents recurrence.", "ar_exp": "التغذية الراجعة الخاصة ووضع معايير الاجتماعات هو النهج الصحيح. استدعاء شخص ما علنا يحرجه ويضر بالثقة. التغذية الراجعة الخاصة تحترم كرامته مع معالجة السلوك بوضوح."}, {"id": 49, "type": "tf", "tag": "Conflict Handling", "text": "Leaders should always avoid conflict to maintain team harmony.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Avoiding conflict allows problems to grow. Effective leaders address conflict early, fairly, and constructively. Unaddressed conflict damages team morale and performance far more than confronting it properly.", "ar_exp": "خطا. تجنب النزاعات يسمح للمشكلات بالنمو. القادة الفعالون يعالجون النزاعات مبكرا وبشكل عادل وبنّاء."}, {"id": 50, "type": "mcq", "tag": "Conflict Handling", "text": "Which approach best describes a solution-oriented approach to conflict?", "opts": ["Focusing on who is right and who is wrong", "Documenting everything for HR", "Focusing on finding actions that resolve the issue and move forward", "Letting the team sort it out themselves"], "ans": 2, "exp": "Solution-oriented means focusing on how do we fix this and move forward rather than whose fault is it. Leaders who stay solution-focused de-escalate conflict and keep the team productive.", "ar_exp": "التوجه نحو الحل يعني التركيز على كيفية اصلاح هذا والمضي قدما بدلا من التساؤل عن المذنب."}, {"id": 51, "type": "tf", "tag": "Conflict Handling", "text": "Addressing conflict early prevents it from escalating into a bigger team problem.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Early conflict intervention is far more effective than waiting. Small disagreements can grow into major trust breakdowns if ignored. Leaders who address issues early maintain healthier team dynamics.", "ar_exp": "صحيح. التدخل المبكر في النزاع اكثر فعالية بكثير من الانتظار. الخلافات الصغيرة يمكن ان تتحول الى انهيارات كبرى في الثقة اذا تجوهلت."}, {"id": 52, "type": "mcq", "tag": "Resilience", "text": "Self-leadership requires", "opts": ["Goal setting, positive self-talk and self-discipline", "All the above", "Following orders", "Having a title to be able to motivate oneself"], "ans": 0, "exp": "Self-leadership requires goal setting, positive self-talk, and self-discipline. It does NOT require a title or following orders.", "ar_exp": "القيادة الذاتية تتطلب تحديد الاهداف والحديث الايجابي مع النفس والانضباط الذاتي. لا تتطلب لقبا او اتباع الاوامر."}, {"id": 53, "type": "tf", "tag": "Resilience", "text": "Accountability means taking ownership of your actions and their results, whether positive or negative.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Accountability is a core leadership trait. It means owning your decisions and their consequences - not blaming others or making excuses. Accountable leaders build trust.", "ar_exp": "صحيح. المساءلة هي صفة قيادية اساسية. تعني تملّك قراراتك وعواقبها - لا الاء اللوم على الاخرين. القادة المسؤولون يبنون الثقة."}, {"id": 54, "type": "mcq", "tag": "Resilience", "text": "A leader who takes responsibility when things go wrong and avoids blaming their team is demonstrating:", "opts": ["Decisiveness", "Accountability", "Pacesetting", "Self-control"], "ans": 1, "exp": "Accountability - taking responsibility for outcomes rather than blaming the team. This critical leadership trait builds trust and psychological safety.", "ar_exp": "المساءلة - تحمل المسؤولية عن النتائج بدلا من لوم الفريق. هذه الصفة القيادية الحيوية تبني الثقة والامان النفسي."}, {"id": 55, "type": "tf", "tag": "Resilience", "text": "Resilience means never experiencing stress or negative emotions as a leader.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Resilience is NOT the absence of stress. It is the ability to experience setbacks and still bounce back. All leaders face difficulty - resilient ones recover faster and use adversity to grow.", "ar_exp": "خطا. المرونة ليست غياب الضغط. انها القدرة على تجربة الانتكاسات والتعافي منها. القادة المرنون يتعافون بشكل اسرع."}, {"id": 56, "type": "mcq", "tag": "Resilience", "text": "Which of the following is NOT a characteristic of a resilient leader?", "opts": ["Adapts to change quickly", "Learns from failures", "Avoids all challenging situations", "Maintains composure under pressure"], "ans": 2, "exp": "Avoiding all challenging situations is the OPPOSITE of resilience. Resilient leaders actively face challenges, adapt to change, learn from failure, and maintain composure under pressure.", "ar_exp": "تجنب جميع المواقف الصعبة هو عكس المرونة تماما. القادة المرنون يواجهون التحديات بنشاط ويتكيفون مع التغيير ويتعلمون من الفشل."}, {"id": 57, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: Your team has just gone through a painful company restructuring. Trust is low and morale is poor. What is the best leadership style?", "opts": ["Pacesetting", "Commanding", "Affiliative", "Democratic"], "ans": 2, "exp": "Affiliative is the best choice when trust has been broken and morale is low. Its focus on People come first - creating emotional bonds, empathy, and connection - is exactly what a team needs to heal and rebuild trust.", "ar_exp": "التلاحم هو الخيار الافضل حين تنكسر الثقة وتتراجع الروح المعنوية. تركيزه على 'الناس اولا' وخلق الروابط العاطفية هو بالضبط ما يحتاجه الفريق للشفاء."}, {"id": 58, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: You are leading a highly skilled and motivated team on a time-sensitive project. You need excellent results delivered very quickly. Which style is best?", "opts": ["Affiliative", "Pacesetting", "Democratic", "Coaching"], "ans": 1, "exp": "Pacesetting works best with highly skilled, already-motivated teams that need to deliver fast, high-quality results. It would damage a less-skilled team but energizes an already-expert team.", "ar_exp": "وضع الايقاع يعمل بشكل افضل مع الفرق الماهرة ذات الدافعية العالية. سيضر بفريق اقل مهارة لكنه ينشط الفريق الخبير."}, {"id": 59, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: Your organization needs to change direction completely due to a new market reality. The team is confused about where to go. Which leadership style is most needed?", "opts": ["Commanding", "Coaching", "Visionary", "Pacesetting"], "ans": 2, "exp": "Visionary is the most broadly effective style for navigating change. When people are confused, they need a clear, inspiring picture of the future. Visionary provides exactly that.", "ar_exp": "القيادة الرؤيوية (التحفيزية) هي الاكثر فعالية للتعامل مع التغيير. حين يكون الناس في حيرة، يحتاجون الى صورة واضحة وملهمة للمستقبل."}, {"id": 60, "type": "mcq", "tag": "Goleman 6 Styles", "text": "A leader using the Democratic style would most likely say:", "opts": ["Do what I tell you", "Come with me", "What do you think?", "People come first"], "ans": 2, "exp": "What do you think? is the signature phrase of Democratic leadership. It reflects the focus on gathering input, building consensus, and trusting the team's judgment.", "ar_exp": "'ما رايك؟' هي العبارة المميزة للقيادة الديمقراطية. تعكس التركيز على جمع المدخلات وبناء الاجماع والثقة في حكم الفريق."}, {"id": 61, "type": "mcq", "tag": "Goleman 6 Styles", "text": "The Pacesetting leader is most likely to fail when:", "opts": ["The team is highly skilled and experienced", "The team needs results quickly", "The team has low skills or is demotivated", "The team is working on a technical project"], "ans": 2, "exp": "Pacesetting fails with low-skill or demotivated teams. The style sets extremely high standards and expects everyone to keep pace. This overwhelms struggling members and worsens low motivation.", "ar_exp": "اسلوب وضع الايقاع يفشل مع الفرق قليلة المهارة او المحبطة. يضع معايير عالية للغاية ويتوقع من الجميع مواكبة القائد مما يرهق اعضاء الفريق المتعثرين."}, {"id": 62, "type": "tf", "tag": "Goleman 6 Styles", "text": "The Visionary (Authoritative) style is the most broadly effective of Goleman's 6 styles.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Goleman's research found that the Authoritative (Visionary) style has the strongest positive impact on organizational climate and works effectively in almost all situations.", "ar_exp": "صحيح. وجد بحث غولمان ان الاسلوب التحفيزي (الرؤيوي) له اقوى تاثير ايجابي على المناخ التنظيمي ويعمل بفعالية في تقريبا جميع الحالات."}, {"id": 63, "type": "mcq", "tag": "Goleman 6 Styles", "text": "Which two Goleman styles can have the most NEGATIVE impact on team climate if overused?", "opts": ["Affiliative and Democratic", "Visionary and Coaching", "Coercive (Commanding) and Pacesetting", "Democratic and Affiliative"], "ans": 2, "exp": "Coercive creates fear and resentment; Pacesetting creates anxiety and burnout. Goleman's research showed they most consistently hurt team climate when used as default styles.", "ar_exp": "الاوامر تخلق الخوف والاستياء؛ ووضع الايقاع يخلق القلق والارهاق. بحث غولمان اظهر انهما يضران بالمناخ التنظيمي حين يستخدمان كاسلوب افتراضي."}, {"id": 64, "type": "scenario", "tag": "Situational Leadership", "text": "Scenario: An employee knows the job well but has been struggling with confidence after a critical project failed. Her competence is high but she now doubts herself. Which style is correct?", "opts": ["S1: Directing", "S2: Coaching", "S3: Supporting", "S4: Delegating"], "ans": 2, "exp": "This is a D3 situation - high competence but temporarily low confidence. S3 Supporting is correct: provide high emotional support, listen, encourage, and remind her of past successes. The issue is motivation, not skill.", "ar_exp": "هذا وضع D3 - كفاءة عالية لكن ثقة منخفضة مؤقتا. S3 الدعم صحيح: وفّر دعما عاطفيا عاليا واستمع وشجع وذكّرها بنجاحاتها السابقة."}, {"id": 65, "type": "scenario", "tag": "Situational Leadership", "text": "Scenario: A new team member with relevant prior experience joins. They have not yet proven themselves in your specific environment. Which style is most appropriate initially?", "opts": ["S4: Delegating", "S3: Supporting", "S2: Coaching", "S1: Directing"], "ans": 2, "exp": "Even with prior experience, a new team member is likely D2 in your specific context. S2 Coaching - high task plus high support - helps them apply their skills while understanding the new context.", "ar_exp": "حتى مع الخبرة السابقة، من المحتمل ان يكون عضو الفريق الجديد في مستوى D2 في سياقك المحدد. S2 التدريب - توجيه عال ودعم عال - يساعده على تطبيق مهاراته مع فهم السياق الجديد."}, {"id": 66, "type": "tf", "tag": "Situational Leadership", "text": "The Situational Leadership Model requires leaders to use only one style for each team member, regardless of the task.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. The key principle is flexibility. Development levels are task-specific, meaning you might use S1 for one task and S4 for another with the SAME person, depending on their competence and commitment per task.", "ar_exp": "خطا. المبدا الاساسي هو المرونة. مستويات التطور خاصة بالمهمة، مما يعني انك قد تستخدم S1 لمهمة و S4 لاخرى مع نفس الشخص."}, {"id": 67, "type": "mcq", "tag": "Situational Leadership", "text": "In Situational Leadership, D1 is defined as:", "opts": ["High competence, high commitment", "Some competence, low commitment", "Low competence, high commitment", "High competence, variable commitment"], "ans": 2, "exp": "D1 = Low competence, High commitment. This is the enthusiastic beginner - excited and motivated but lacking the skills or knowledge to do the task well. The matching style is S1 Directing.", "ar_exp": "D1 = كفاءة منخفضة، التزام عال. هذا هو المبتدئ المتحمس - متحفز ومندفع لكن يفتقر الى المهارة. الاسلوب المناسب هو S1 التوجيه."}, {"id": 68, "type": "mcq", "tag": "Situational Leadership", "text": "Which development level matches an employee who has developed good skills over months but has become less motivated and sometimes disengaged?", "opts": ["D1", "D2", "D3", "D4"], "ans": 2, "exp": "D3 = High competence, Variable commitment. Skilled but losing motivation is a very common profile with experienced employees. They need S3 Supporting to re-ignite commitment.", "ar_exp": "D3 = كفاءة عالية، التزام متغير. الماهر لكن الفاقد للدافعية هو ملف شائع جدا بين الموظفين ذوي الخبرة. يحتاجون S3 الدعم لاعادة اشعال الالتزام."}, {"id": 69, "type": "mcq", "tag": "Situational Leadership", "text": "The correct sequence of steps to apply Situational Leadership is:", "opts": ["Adapt style, then assess, then identify task", "Identify the task, assess readiness, then adapt the style", "Assess readiness, identify task, then adapt style", "Adapt, then identify, then assess"], "ans": 1, "exp": "The 3-step process is: (1) Identify the Task - be specific, (2) Assess Readiness - evaluate competence and commitment, (3) Adapt the Style - match S1/S2/S3/S4 to the D level found.", "ar_exp": "الخطوات الثلاث هي: (1) تحديد المهمة بدقة، (2) تقييم الجاهزية - الكفاءة والالتزام، (3) تكييف الاسلوب ومطابقة S1/S2/S3/S4 مع مستوى D المحدد."}, {"id": 70, "type": "mcq", "tag": "Emotional Intelligence", "text": "Which of the following is NOT one of Goleman's five components of Emotional Intelligence?", "opts": ["Self-awareness", "Technical competence", "Empathy", "Self-regulation"], "ans": 1, "exp": "Technical competence is NOT part of Emotional Intelligence. Goleman's 5 EI components are: Self-awareness, Self-regulation, Motivation, Empathy, and Social skills.", "ar_exp": "الكفاءة التقنية ليست جزءا من الذكاء العاطفي. مكونات الذكاء العاطفي الخمسة لغولمان هي: الوعي الذاتي والتنظيم الذاتي والدافعية والتعاطف والمهارات الاجتماعية."}, {"id": 71, "type": "mcq", "tag": "Emotional Intelligence", "text": "A leader who stays calm and composed under intense pressure is demonstrating which EI component?", "opts": ["Empathy", "Self-regulation", "Motivation", "Social skills"], "ans": 1, "exp": "Self-regulation is the ability to manage disruptive emotions and impulses - staying calm, composed, and thoughtful rather than reacting impulsively. Critical for leaders under high-pressure situations.", "ar_exp": "التنظيم الذاتي هو القدرة على ادارة العواطف والدوافع المعطلة - البقاء هادئا ومتاملا بدلا من الاستجابة بتهور. امر حيوي للقادة في المواقف عالية الضغط."}, {"id": 72, "type": "mcq", "tag": "Emotional Intelligence", "text": "A leader who accurately reads how team members are feeling and adjusts their communication accordingly is demonstrating:", "opts": ["Self-awareness", "Technical skills", "Empathy", "Decisiveness"], "ans": 2, "exp": "Empathy is the ability to understand and share the feelings of others - recognizing their emotional state and responding appropriately. Empathetic leaders build stronger relationships.", "ar_exp": "التعاطف هو القدرة على فهم مشاعر الاخرين ومشاركتها والتعرف على حالتهم العاطفية والاستجابة بشكل مناسب. القادة المتعاطفون يبنون علاقات اقوى."}, {"id": 73, "type": "tf", "tag": "Emotional Intelligence", "text": "Self-regulation in Emotional Intelligence means completely suppressing emotions in the workplace.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Self-regulation does NOT mean suppressing emotions. It means managing disruptive emotions and choosing how to respond thoughtfully rather than reacting impulsively.", "ar_exp": "خطا. التنظيم الذاتي لا يعني كبت العواطف. يعني ادارة العواطف المعطلة واختيار كيفية الاستجابة بتامل بدلا من الرد بتهور."}, {"id": 74, "type": "mcq", "tag": "Emotional Intelligence", "text": "A leader driven by an internal desire to achieve and improve - not just by external rewards - is demonstrating which EI component?", "opts": ["Empathy", "Social skills", "Self-awareness", "Intrinsic Motivation"], "ans": 3, "exp": "Intrinsic Motivation - being driven by internal passion, purpose, and the desire to excel - is one of Goleman's 5 EI components. These leaders are optimistic and committed.", "ar_exp": "الدافعية الجوهرية - الاندفاع بالشغف الداخلي والهدف والرغبة في التميز - هي احد مكونات الذكاء العاطفي الخمسة لغولمان. هؤلاء القادة متفائلون وملتزمون."}, {"id": 75, "type": "mcq", "tag": "Emotional Intelligence", "text": "Which EI component helps a leader build networks, manage relationships, and find common ground with diverse people?", "opts": ["Self-awareness", "Self-regulation", "Empathy", "Social skills"], "ans": 3, "exp": "Social skills is the EI component that enables leaders to build relationships, manage disagreements, and inspire others. Leaders with strong social skills are effective at teamwork and collaboration.", "ar_exp": "المهارات الاجتماعية هي مكون الذكاء العاطفي الذي يمكّن القادة من بناء العلاقات وادارة الخلافات والهام الاخرين. القادة ذوو المهارات الاجتماعية القوية فعّالون في العمل الجماعي."}, {"id": 76, "type": "mcq", "tag": "Communication", "text": "Active listening in leadership means:", "opts": ["Waiting for your turn to speak", "Fully concentrating, understanding, and responding to the speaker", "Nodding your head while thinking of your response", "Taking detailed notes during every meeting"], "ans": 1, "exp": "Active listening means fully concentrating on the speaker, understanding their message, and responding thoughtfully. Leaders who listen actively build stronger trust and make better decisions.", "ar_exp": "الاستماع الفعال يعني التركيز الكامل على المتحدث وفهم رسالته والاستجابة بتامل. القادة الذين يستمعون بفاعلية يبنون ثقة اقوى ويتخذون قرارات افضل."}, {"id": 77, "type": "tf", "tag": "Communication", "text": "Non-verbal communication such as body language and tone is less important than the words a leader uses.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Research shows that non-verbal communication often carries more weight than words. Leaders must align their words, tone, and body language to communicate credibly and effectively.", "ar_exp": "خطا. تظهر الابحاث ان التواصل غير اللفظي كثيرا ما يحمل ثقلا اكبر من الكلمات. يجب على القادة مواءمة كلماتهم ونبرتهم ولغة جسدهم للتواصل بمصداقية."}, {"id": 78, "type": "mcq", "tag": "Communication", "text": "When giving feedback, which approach is most effective for a leader?", "opts": ["Focus only on what went wrong", "Give only positive feedback to maintain morale", "Give specific balanced feedback that includes both strengths and areas for improvement", "Save all feedback for the annual performance review"], "ans": 2, "exp": "Effective feedback is specific, balanced (acknowledges what worked AND what needs improvement), and timely. Leaders who give ongoing balanced feedback help team members grow continuously.", "ar_exp": "التغذية الراجعة الفعالة محددة (لا غامضة)، ومتوازنة (تقر بما نجح وما يحتاج تحسينا)، وفي حينها. القادة الذين يقدمون تغذية راجعة متوازنة مستمرة يساعدون اعضاء الفريق على النمو."}, {"id": 79, "type": "mcq", "tag": "Communication", "text": "A leader who privately addresses a team member's behavior rather than calling them out in front of the team is demonstrating:", "opts": ["Weakness and inability to confront", "Respect and emotional intelligence", "Avoidance of difficult conversations", "Favoritism"], "ans": 1, "exp": "Private feedback respects the person's dignity and is far more effective than public criticism. Calling someone out publicly activates defensiveness and embarrassment. Private feedback is the EI-based approach.", "ar_exp": "التغذية الراجعة الخاصة تحترم كرامة الشخص واكثر فعالية بكثير من النقد العلني. النقد العلني يفعّل الدفاعية والاحراج. التغذية الراجعة الخاصة هي النهج القائم على الذكاء العاطفي."}, {"id": 80, "type": "scenario", "tag": "Application", "text": "Scenario: Your team member just made a significant mistake on a client presentation. How should you handle it as a Growth mindset leader?", "opts": ["Remove them from client-facing work permanently", "Use it as a coaching and learning opportunity", "Tell the team as a warning example", "File a formal performance warning immediately"], "ans": 1, "exp": "A Growth mindset leader treats mistakes as learning opportunities. Coach the team member: What happened? What can we learn? What will you do differently? This builds capability and psychological safety.", "ar_exp": "القائد ذو العقلية النامية يعامل الاخطاء كفرص تعلم. يتدرب على عضو الفريق: ماذا حدث؟ ماذا نتعلم؟ ماذا ستفعل بشكل مختلف؟ هذا يبني الكفاءة والامان النفسي."}, {"id": 81, "type": "scenario", "tag": "Application", "text": "Scenario: You notice that two team members disagree strongly about the approach to a project. The disagreement is professional. As a leader, what is the best first step?", "opts": ["Make the decision for them to save time", "Let them argue until one gives up", "Facilitate a structured discussion where both can present their reasoning", "Escalate to your manager immediately"], "ans": 2, "exp": "Facilitating a structured discussion allows both parties to be heard, respects their professional perspectives, and often produces a better solution by combining both viewpoints. This is solution-oriented conflict management.", "ar_exp": "تسهيل نقاش منظم يتيح لكلا الطرفين الاستماع اليه، ويحترم وجهات نظرهم المهنية، وكثيرا ما ينتج حلا افضل بدمج كلا وجهتي النظر."}, {"id": 82, "type": "scenario", "tag": "Application", "text": "Scenario: You are managing a junior team member who has been with the team for 3 months. They are improving fast but still make frequent small mistakes. Which approach is best?", "opts": ["S4: Delegate all tasks and trust them to figure it out", "S1: Give detailed instructions and check their work closely then gradually give more freedom", "Avoid assigning important work to them", "Assign a senior team member to supervise everything they do"], "ans": 1, "exp": "This is a transitioning D1 to D2 situation. S1/S2 is appropriate - provide clear instructions, check work closely, then GRADUALLY increase autonomy as they demonstrate improvement.", "ar_exp": "هذا وضع D1 ينتقل الى D2. S1/S2 مناسب - وفّر تعليمات واضحة وتحقق من العمل عن كثب، ثم زد الاستقلالية تدريجيا مع تحسن ادائه."}, {"id": 83, "type": "mcq", "tag": "Application", "text": "A leader who always uses the same leadership style regardless of the person or situation is:", "opts": ["Consistent and reliable", "Effective because people know what to expect", "Inflexible and likely to be ineffective in many situations", "A great example of the Visionary style"], "ans": 2, "exp": "Using one style for all situations is inflexible and ineffective. Situational Leadership explicitly states that the right style depends on the development level and the specific task. One-size-fits-all fails many team members.", "ar_exp": "استخدام اسلوب واحد لجميع المواقف غير مرن وغير فعال. القيادة الظرفية تنص صراحة على ان الاسلوب الصحيح يعتمد على مستوى التطور والمهمة المحددة."}, {"id": 84, "type": "tf", "tag": "Application", "text": "A leader should switch from a Commanding style to a more supportive style once a crisis has been resolved.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Commanding is for crisis situations only. Once the crisis is resolved, continuing to use Commanding destroys morale, trust, and initiative. Transition back to Visionary, Democratic, Coaching, or Affiliative as appropriate.", "ar_exp": "صحيح. الاوامر لمواقف الازمات فقط. الاستمرار في استخدامها بعد انتهاء الازمة يدمر الروح المعنوية والثقة والمبادرة. انتقل الى الرؤيوي او الديمقراطي او التدريب او التلاحم."}, {"id": 85, "type": "mcq", "tag": "Self-Awareness", "text": "A Personal SWOT analysis for leaders is used to:", "opts": ["Analyze market competition", "Evaluate financial performance", "Self-assess Strengths, Weaknesses, Opportunities, and Threats for personal growth", "Plan a product launch"], "ans": 2, "exp": "A Personal SWOT is a self-assessment tool where leaders evaluate their own Strengths, Weaknesses, Opportunities for growth, and Threats to their effectiveness. It builds self-awareness and guides personal development planning.", "ar_exp": "التحليل الشخصي SWOT هو اداة تقييم ذاتي حيث يقيّم القادة نقاط قوتهم وضعفهم وفرص النمو والتهديدات التي تواجه فعاليتهم. يبني الوعي الذاتي ويوجه التخطيط للتطوير الشخصي."}, {"id": 86, "type": "tf", "tag": "Self-Awareness", "text": "In a Personal SWOT analysis, Threats refer only to external market competition facing the organization.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. In a PERSONAL SWOT for leaders, Threats are factors that could undermine YOUR effectiveness as a leader - such as blind spots, bad habits, or overusing a particular leadership style.", "ar_exp": "خطا. في SWOT الشخصي للقادة، التهديدات هي العوامل التي قد تضعف فعاليتك كقائد مثل النقاط العمياء والعادات السيئة او الافراط في استخدام اسلوب قيادي معين."}, {"id": 87, "type": "mcq", "tag": "Self-Awareness", "text": "A leadership blind spot is best described as:", "opts": ["A task the leader refuses to do", "A weakness the leader is unaware of that impacts others", "A leadership style the leader has not studied", "A gap in the team's technical skills"], "ans": 1, "exp": "A blind spot is a leadership behavior or pattern that negatively impacts others but the leader is NOT aware of. SWOT analysis and 360-degree feedback help identify blind spots.", "ar_exp": "النقطة العمياء هي سلوك قيادي او نمط يؤثر سلبا على الاخرين لكن القائد غير مدرك له. يساعد تحليل SWOT والتغذية الراجعة 360 درجة على تحديد النقاط العمياء."}, {"id": 88, "type": "tf", "tag": "Self-Awareness", "text": "A strength that a leader overuses can eventually become a weakness.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Any strength taken to an extreme can become a liability. For example, a very detail-oriented leader who micromanages everything actually damages team performance and morale.", "ar_exp": "صحيح. اي قوة يبالغ في استخدامها يمكن ان تصبح عائقا. القائد المثالي في التفاصيل اذا تحوّل الى ادارة تفصيلية لكل شيء فهو يضر بأداء الفريق."}, {"id": 89, "type": "mcq", "tag": "Self-Awareness", "text": "Which of the following best reflects the concept of self-awareness in leadership?", "opts": ["Knowing every technical detail of your team's work", "Understanding your own emotions, strengths, weaknesses, and how you impact others", "Monitoring your team's performance metrics daily", "Having high confidence in all situations"], "ans": 1, "exp": "Self-awareness is the ability to accurately understand your own emotions, strengths, weaknesses, values, and how your behavior impacts the people around you. It is the foundation of all other EI components.", "ar_exp": "الوعي الذاتي هو القدرة على فهم عواطفك ونقاط قوتك وضعفك وقيمك بدقة وكيف يؤثر سلوكك على الناس من حولك. انه اساس جميع مكونات الذكاء العاطفي الاخرى."}, {"id": 90, "type": "scenario", "tag": "Application", "text": "Scenario: You lead a cross-functional team. A senior technical expert delivers excellent work but refuses to collaborate or share knowledge. How do you handle this?", "opts": ["Accept it - their technical output is too valuable to risk", "Give them a formal warning immediately", "Have a one-on-one coaching conversation about the impact of their behavior on the team", "Move them to a solo role with no team interaction"], "ans": 2, "exp": "A coaching conversation is the right approach. Acknowledge the value they bring AND address the impact their non-collaborative behavior has on the team. Set clear expectations and explore what is causing the behavior.", "ar_exp": "محادثة التدريب هي النهج الصحيح. اعترف بالقيمة التي يضيفونها وعالج تاثير سلوكهم غير التعاوني على الفريق. ضع توقعات سلوكية واضحة واستكشف سبب هذا السلوك."}, {"id": 91, "type": "scenario", "tag": "Application", "text": "Scenario: Two team members have a personal conflict beginning to affect the whole team's performance. What should a leader do first?", "opts": ["Wait and see if they resolve it themselves", "Meet with each person separately to understand their perspective before bringing them together", "Tell the whole team to ignore the personal issues", "Immediately escalate to HR"], "ans": 1, "exp": "Meet with each person separately first. This allows each person to feel heard and safe to express their perspective. Once you understand both sides, you can facilitate a structured resolution conversation.", "ar_exp": "قابل كل شخص بشكل منفصل اولا. يتيح ذلك لكل شخص الشعور بالاستماع والامان للتعبير عن وجهة نظره. بمجرد فهم كلا الجانبين، يمكنك تسهيل محادثة حل منظمة."}, {"id": 92, "type": "mcq", "tag": "Application", "text": "A leader who sets clear goals for their team AND gives them freedom to decide HOW to achieve those goals is practicing:", "opts": ["Micromanagement", "Results-focused empowering leadership", "Avoiding responsibility", "Delegating without accountability"], "ans": 1, "exp": "This describes empowering leadership - setting clear goals and expectations while giving autonomy on HOW to achieve them. This is especially effective with D3 and D4 team members and builds intrinsic motivation.", "ar_exp": "هذا يصف القيادة التمكينية - وضع اهداف وتوقعات واضحة (المساءلة) مع منح الاستقلالية في كيفية تحقيقها (الحرية والتملك). فعالة بشكل خاص مع موظفي D3 و D4."}, {"id": 93, "type": "tf", "tag": "Application", "text": "Psychological safety in a team means that team members feel safe to take risks, share ideas, and admit mistakes without fear of punishment.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Psychological safety is the belief that the team is safe for interpersonal risk-taking. It is essential for innovation, learning, and honest communication. Leaders build it by modeling vulnerability and responding positively to mistakes.", "ar_exp": "صحيح. السلامة النفسية هي الاعتقاد بان الفريق آمن لتحمل المخاطر الشخصية. ضرورية للابتكار والتعلم والتواصل الصادق. يبنيها القادة بنمذجة الضعف والاستجابة الايجابية للاخطاء."}, {"id": 94, "type": "scenario", "tag": "Application", "text": "Scenario: Your team is performing well but has become too comfortable with routine tasks. Innovation has stopped. What would you do?", "opts": ["Leave them alone - they are performing well", "Use Pacesetting to raise the bar and challenge them", "Use Coaching to create stretch goals and development opportunities", "Use Commanding to enforce new procedures"], "ans": 2, "exp": "Coaching is ideal here. The team needs new challenges and development opportunities to reignite growth. Coaching conversations combined with ambitious new goals will break the routine-comfort trap.", "ar_exp": "التدريب مثالي هنا. يحتاج الفريق الى تحديات جديدة وفرص تطوير لاعادة اشعال النمو. محادثات التدريب جنبا الى جنب مع اهداف طموحة جديدة ستكسر فخ الراحة الروتينية."}, {"id": 95, "type": "tf", "tag": "Situational Leadership", "text": "S3 Supporting in Situational Leadership involves low task behavior and high relationship support behavior.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. S3 Supporting = Low directive + High supportive. The leader focuses on encouraging, listening, and building confidence rather than giving task instructions. Used for D3 employees who have skills but need motivational support.", "ar_exp": "صحيح. S3 الدعم = توجيه منخفض + دعم علاقاتي عال. يركز القائد على التشجيع والاستماع وبناء الثقة بدلا من اعطاء تعليمات المهام. يستخدم لموظفي D3."}, {"id": 96, "type": "tf", "tag": "Situational Leadership", "text": "S4 Delegating means the leader has no responsibility for the outcome and can ignore the team member completely.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Delegating means the leader gives the team member ownership and autonomy. The leader still holds ultimate accountability for results and should check in periodically. Delegation is trust plus accountability, not abandonment.", "ar_exp": "خطا. التفويض يعني منح عضو الفريق الملكية والاستقلالية. القائد لا يزال يحمل المساءلة النهائية عن النتائج ويجب ان يتحقق دوريا. التفويض هو ثقة + مساءلة وليس تخليا."}, {"id": 97, "type": "tf", "tag": "Goleman 6 Styles", "text": "A leader can and should use more than one of Goleman's 6 styles, switching between them based on the situation.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. The best leaders are style-fluid - they have the self-awareness to recognize what each situation requires and the skill to switch between styles effectively. Goleman himself said the most effective leaders use multiple styles.", "ar_exp": "صحيح. افضل القادة مرنون في الاسلوب - لديهم الوعي الذاتي لتشخيص ما تتطلبه كل حالة والمهارة للتنقل بين الاساليب بفعالية."}, {"id": 98, "type": "tf", "tag": "Foundation", "text": "Leadership is only important for people in senior management positions.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Leadership can be demonstrated at any level of an organization. Individual contributors and junior staff can all show leadership through initiative, influence, ownership, and modeling desired behaviors.", "ar_exp": "خطا. القيادة يمكن اظهارها في اي مستوى من المؤسسة. يمكن للمساهمين الفرديين والموظفين الجدد اظهار القيادة من خلال المبادرة والتاثير وتملّك العمل."}, {"id": 99, "type": "tf", "tag": "Goleman 6 Styles", "text": "The Commanding leadership style should be used as the primary day-to-day management approach because it ensures compliance.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. The Commanding style is explicitly for crisis situations only. Used as a daily management style, it destroys morale, creativity, trust, and psychological safety.", "ar_exp": "خطا. اسلوب الاوامر مخصص لمواقف الازمات فقط. استخدامه كاسلوب ادارة يومي يدمر الروح المعنوية والابداع والثقة والامان النفسي."}, {"id": 100, "type": "mcq", "tag": "Foundation", "text": "Which of the following best describes the difference between a transactional and a transformational leader?", "opts": ["Transactional leaders inspire change; transformational leaders manage day-to-day", "Transactional leaders use reward and punishment; transformational leaders inspire through vision", "Transactional leaders are more effective in all situations", "Transformational leaders focus only on short-term tasks"], "ans": 1, "exp": "Transactional leadership is based on exchange - rewards for compliance, consequences for non-compliance. Transformational leadership inspires people to go beyond self-interest for a collective vision.", "ar_exp": "القيادة التبادلية تعتمد على التبادل - مكافآت للامتثال وعواقب لعدمه. القيادة التحويلية تلهم الناس لتجاوز المصلحة الذاتية من اجل رؤية جماعية مما يخلق التزاما اعمق."}, {"id": 101, "type": "mcq", "tag": "Emotional Intelligence", "text": "Which EI component is considered the foundation of all other EI components?", "opts": ["Empathy", "Self-regulation", "Self-awareness", "Social skills"], "ans": 2, "exp": "Self-awareness is the foundation of all EI. You cannot regulate emotions, motivate yourself, empathize with others, or manage relationships well if you do not first understand your own emotional state and its impact.", "ar_exp": "الوعي الذاتي هو اساس الذكاء العاطفي. لا يمكنك تنظيم عواطفك او التعاطف مع الاخرين او ادارة العلاقات جيدا اذا لم تفهم اولا حالتك العاطفية وتاثيرها على الاخرين."}, {"id": 102, "type": "mcq", "tag": "Goleman 6 Styles", "text": "A leader says to their team: Here is our destination and why it matters. You decide how we get there. This best describes which Goleman style?", "opts": ["Democratic", "Commanding", "Visionary (Authoritative)", "Pacesetting"], "ans": 2, "exp": "This is Visionary leadership. The Visionary leader sets a clear direction and explains the why, but gives team members freedom in HOW they achieve it. Different from Democratic where the team also helps decide the direction.", "ar_exp": "هذا هو اسلوب القيادة الرؤيوية. يحدد القائد الرؤيوي اتجاها واضحا ويشرح السبب لكنه يمنح اعضاء الفريق الحرية في كيفية تحقيقه."}, {"id": 103, "typ
