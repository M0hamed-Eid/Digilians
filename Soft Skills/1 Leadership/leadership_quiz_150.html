e": "scenario", "tag": "Situational Leadership", "text": "Scenario: A team member is brand new to their role and has never done this type of project before. They are very nervous and unsure. Which development level and leadership style apply?", "opts": ["D4 - S4 Delegating", "D1 - S1 Directing", "D3 - S3 Supporting", "D2 - S2 Coaching"], "ans": 1, "exp": "Brand new plus never done this before = D1. S1 Directing provides the structure, clarity, and step-by-step guidance this person needs most.", "ar_exp": "جديد تماما ولم يفعل هذا من قبل = D1. S1 التوجيه يوفر البنية والوضوح والارشاد خطوة بخطوة الذي يحتاجه هذا الشخص اكثر من اي شيء."}, {"id": 104, "type": "mcq", "tag": "Conflict Handling", "text": "A team member comes to you complaining about a colleague's behavior. What is the best first action?", "opts": ["Immediately confront the colleague", "Listen actively to understand the full situation before taking action", "Tell the complaining team member to sort it out themselves", "Send an email to the whole team about acceptable behavior"], "ans": 1, "exp": "Active listening first. Before acting, you need to fully understand the situation from one perspective. After listening, speak with the other party too before facilitating a resolution. Acting without all information risks making things worse.", "ar_exp": "الاستماع الفعال اولا. قبل التصرف، تحتاج الى فهم الموقف الكامل من منظور واحد. بعد الاستماع تحدث ايضا مع الطرف الاخر قبل تسهيل حل."}, {"id": 105, "type": "tf", "tag": "Foundation", "text": "The ability to influence people without using formal authority is a core component of effective leadership.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Influencing without authority is one of the most important leadership capabilities. It relies on credibility, relationships, communication skills, and demonstrated expertise rather than positional power.", "ar_exp": "صحيح. التاثير بدون سلطة هو واحدة من اهم قدرات القيادة. يعتمد على المصداقية والعلاقات ومهارات التواصل والخبرة المثبتة وليس على القوة الموضعية."}, {"id": 106, "type": "mcq", "tag": "Situational Leadership", "text": "Which combination correctly matches the development level to the right leadership style?", "opts": ["D1 - Delegating, D4 - Directing", "D2 - Supporting, D3 - Coaching", "D1 - Directing, D2 - Coaching, D3 - Supporting, D4 - Delegating", "D3 - Directing, D1 - Coaching"], "ans": 2, "exp": "The correct matching is: D1-S1 Directing, D2-S2 Coaching, D3-S3 Supporting, D4-S4 Delegating. This is the core framework of Situational Leadership.", "ar_exp": "المطابقة الصحيحة هي: D1-S1 التوجيه، D2-S2 التدريب، D3-S3 الدعم، D4-S4 التفويض. هذا هو الاطار الاساسي للقيادة الظرفية."}, {"id": 107, "type": "mcq", "tag": "Goleman 6 Styles", "text": "The Democratic leadership style is least effective when:", "opts": ["The team is experienced and motivated", "You need the team's buy-in on a complex decision", "The team lacks experience or the situation requires a fast decision", "You are working through a strategic planning process"], "ans": 2, "exp": "Democratic style fails when the team lacks competence to contribute meaningful input, or when the situation is urgent and there is no time for consensus-building.", "ar_exp": "الاسلوب الديمقراطي يفشل حين يفتقر الفريق الى الكفاءة لتقديم مدخلات ذات معنى، او حين يكون الموقف ملحا ولا يوجد وقت لبناء الاجماع."}, {"id": 108, "type": "scenario", "tag": "Application", "text": "Scenario: You are a new team leader. Your team has been working together for years with high performance. On your first day you start changing everything and giving detailed instructions. What is the likely result?", "opts": ["The team appreciates the fresh leadership approach", "The team becomes more productive immediately", "The team becomes frustrated and demotivated as they feel their expertise is not trusted", "The team needs this level of direction to improve further"], "ans": 2, "exp": "A high-performing, experienced team needs S4 Delegating - not S1 Directing. Walking in and micromanaging an expert team communicates distrust and disrespect. A new leader should first observe, listen, and build relationships.", "ar_exp": "فريق عالي الاداء يحتاج S4 التفويض - لا S1 التوجيه. الدخول وادارة فريق خبير بالتفاصيل يوصل رسالة عدم الثقة وعدم الاحترام. يجب على القائد الجديد ان يراقب ويستمع ويبني علاقات اولا."}, {"id": 109, "type": "tf", "tag": "Conflict Handling", "text": "When handling conflict, the leader's role is to identify who is right and who is wrong.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. The leader's role in conflict is NOT to judge right vs. wrong but to facilitate a constructive resolution. The focus should be on understanding all perspectives and finding a solution that allows the team to move forward.", "ar_exp": "خطا. دور القائد في النزاع ليس الحكم على الصواب والخطا بل تسهيل حل بنّاء. يجب ان يركز على فهم جميع وجهات النظر وايجاد حل يسمح للفريق بالمضي قدما."}, {"id": 110, "type": "scenario", "tag": "Situational Leadership", "text": "Scenario: After 6 months of working closely with a team member through S1 then S2, they have fully mastered the task and consistently deliver excellent results with enthusiasm. What should the leader do now?", "opts": ["Continue with S2 Coaching to maintain quality", "Switch to S3 Supporting to provide emotional backup", "Move to S4 Delegating - trust them fully and give them ownership", "Go back to S1 Directing to maintain standards"], "ans": 2, "exp": "The team member has grown to D4. The correct response is to evolve to S4 Delegating. Continuing to coach or direct them would feel like micromanagement and would not match their development level.", "ar_exp": "عضو الفريق نما الى D4. الاستجابة الصحيحة هي التطور الى S4 التفويض. الاستمرار في تدريبه او توجيهه سيبدو كادارة تفصيلية ولن يتناسب مع مستوى تطوره."}, {"id": 111, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: One of your team members is excellent at their job but has become arrogant and dismissive toward junior colleagues. How should you handle this?", "opts": ["Ignore it - their performance is too good to risk", "Give them immediate negative public feedback", "Have a private coaching conversation about the impact of their behavior on team culture", "Transfer them to a solo project with no team interaction"], "ans": 2, "exp": "Private coaching conversation is correct. Acknowledge their performance strengths, then address the specific impact of their dismissive behavior on team culture. Set clear behavioral expectations.", "ar_exp": "محادثة التدريب الخاصة صحيحة. اعترف بنقاط قوة ادائهم ثم عالج التاثير المحدد لسلوكهم المتعالي على ثقافة الفريق. ضع توقعات سلوكية واضحة."}, {"id": 112, "type": "mcq", "tag": "Foundation", "text": "What does modeling desired behaviors mean in the context of leading without authority?", "opts": ["Drawing flowcharts of ideal workplace behaviors", "Demonstrating the behaviors and standards you want others to adopt through your own actions", "Asking management to create behavior policies", "Hiring new people who already have the desired behaviors"], "ans": 1, "exp": "Modeling means demonstrating through YOUR OWN behavior what you want others to do. If you want your team to be punctual and communicate openly - you must consistently do these things yourself first.", "ar_exp": "النمذجة تعني اظهار ما تريد من الاخرين فعله من خلال سلوكك الخاص. اذا اردت من فريقك الالتزام بالمواعيد والتواصل بانفتاح فعليك انت تطبيق ذلك باستمرار اولا."}, {"id": 113, "type": "tf", "tag": "Emotional Intelligence", "text": "A leader with high EI always agrees with their team members to avoid conflict.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. High EI does NOT mean avoiding difficult conversations or always agreeing. It means managing emotions skillfully while having honest, respectful conversations - including challenging ones when needed.", "ar_exp": "خطا. الذكاء العاطفي العالي لا يعني تجنب المحادثات الصعبة او الموافقة دائما. يعني ادارة العواطف بمهارة مع اجراء محادثات صادقة محترمة بما في ذلك المحادثات الصعبة عند الحاجة."}, {"id": 114, "type": "scenario", "tag": "Application", "text": "Scenario: During a team meeting, a team member makes a suggestion that you disagree with. How should you respond as a leader with high EI?", "opts": ["Dismiss the idea immediately to save time", "Acknowledge their contribution, explain your perspective respectfully, and invite further discussion", "Agree with them to avoid conflict even though you disagree", "Ignore the suggestion and move on"], "ans": 1, "exp": "High EI leadership means acknowledging the contribution, explaining your perspective clearly and respectfully, and inviting discussion. This models the collaborative behavior you want from your team.", "ar_exp": "القيادة عالية الذكاء العاطفي تعني الاعتراف بمساهمتهم وشرح وجهة نظرك بوضوح واحترام ودعوة النقاش. هذا ينمذج السلوك التعاوني الذي تريده من فريقك."}, {"id": 115, "type": "mcq", "tag": "Resilience", "text": "Which of the following best describes decisiveness in leadership?", "opts": ["Making fast decisions without gathering any information", "Making well-considered decisions in a timely manner especially under pressure", "Always consulting the full team before any decision", "Delegating all decisions to team members"], "ans": 1, "exp": "Decisiveness is making considered, timely decisions - especially under pressure - rather than delaying. Decisive leaders gather sufficient information, make the call, and commit to it. They do not confuse speed with impulsiveness.", "ar_exp": "الحزم هو اتخاذ قرارات مدروسة وفي حينها - خاصة تحت الضغط - بدلا من التاخير. القادة الحازمون يجمعون معلومات كافية ويتخذون القرار ويلتزمون به."}, {"id": 116, "type": "tf", "tag": "Resilience", "text": "Courage in leadership includes the willingness to have difficult conversations and make unpopular decisions when necessary.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Leadership courage means doing the right thing even when uncomfortable - giving honest feedback, making hard calls, addressing poor performance, standing behind your team. Courageous leaders are trusted more.", "ar_exp": "صحيح. شجاعة القيادة تعني فعل الشيء الصحيح حتى عندما يكون غير مريح - تقديم تغذية راجعة صادقة، واتخاذ قرارات صعبة، ومعالجة الاداء الضعيف."}, {"id": 117, "type": "mcq", "tag": "Application", "text": "A leader who recognizes that their team is burning out and proactively reduces workload or adjusts priorities is demonstrating:", "opts": ["Weakness and poor planning", "Empathy and situational awareness", "Micromanagement", "An inability to meet targets"], "ans": 1, "exp": "Recognizing and responding to burnout signals is empathy plus situational awareness in action. Proactive leaders monitor team energy and wellbeing, not just task completion. Protecting the team from unsustainable pressure is essential for long-term performance.", "ar_exp": "التعرف على الارهاق والاستجابة له هو التعاطف والوعي الظرفي في العمل. القادة الاستباقيون يراقبون طاقة الفريق ورفاهيته وليس فقط انجاز المهام."}, {"id": 118, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: Your organization is about to implement a major change. Some team members support it, others are skeptical. You want everyone on board before execution begins. Which style is best?", "opts": ["Commanding - tell them to comply", "Pacesetting - model the new behaviors yourself", "Democratic - gather input and build consensus before finalizing", "Affiliative - focus only on making everyone feel comfortable"], "ans": 2, "exp": "Democratic is best when you want genuine buy-in before implementation. By involving the team in discussion, addressing concerns, and building consensus, you create ownership rather than compliance.", "ar_exp": "الديمقراطي هو الافضل حين تريد قبولا حقيقيا قبل التطبيق. باشراك الفريق في النقاش ومعالجة المخاوف وبناء الاجماع، تخلق الملكية بدلا من الامتثال."}, {"id": 119, "type": "mcq", "tag": "Situational Leadership", "text": "The phrase Adapt your style to the person and task not the other way around summarizes which leadership model?", "opts": ["Goleman's 6 Leadership Styles", "The Fixed Mindset Model", "Situational Leadership (Hersey and Blanchard)", "Transformational Leadership Theory"], "ans": 2, "exp": "This phrase is the core principle of Situational Leadership by Hersey and Blanchard. The leader adapts their behavior to match the specific development level of the follower for the specific task.", "ar_exp": "هذه العبارة هي المبدا الاساسي للقيادة الظرفية لهيرسي وبلانشارد. القائد يكيف سلوكه ليتناسب مع مستوى تطور المتبع المحدد للمهمة المحددة."}, {"id": 120, "type": "mcq", "tag": "Goleman 6 Styles", "text": "Which Goleman style focuses primarily on building emotional bonds and has the key phrase People come first?", "opts": ["Coaching", "Democratic", "Affiliative", "Visionary"], "ans": 2, "exp": "Affiliative. Its focus is on emotional bonds, inclusion, harmony, and people's emotional needs. Key EI competencies: empathy and communication. Best used when the team needs to heal from conflict.", "ar_exp": "التلاحم. تركيزه على الروابط العاطفية والاندماج والانسجام والاحتياجات العاطفية للناس. الكفاءات العاطفية الاساسية: التعاطف والتواصل."}, {"id": 121, "type": "tf", "tag": "Application", "text": "A leader who gives feedback only during formal annual reviews is providing effective ongoing development for their team.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. Annual reviews are too infrequent to drive continuous development. Effective leaders provide regular, timely, specific feedback throughout the year. This allows team members to course-correct quickly and grow consistently.", "ar_exp": "خطا. المراجعات السنوية غير متكررة بما يكفي لدفع التطور المستمر. القادة الفعالون يقدمون تغذية راجعة منتظمة ومحددة وفي حينها طوال العام."}, {"id": 122, "type": "mcq", "tag": "Foundation", "text": "Which statement best defines modern leadership?", "opts": ["Commanding and controlling people to follow processes", "Inspiring and empowering people to achieve collective goals through influence and collaboration", "Managing budgets and schedules efficiently", "Making all decisions quickly without team input"], "ans": 1, "exp": "Modern leadership is about inspiring and empowering people through influence, not control. It is collaborative, human-centered, and focused on developing people and achieving shared goals.", "ar_exp": "القيادة الحديثة هي الهام الناس وتمكينهم من خلال التاثير وليس السيطرة. انها تعاونية ومحورها الانسان وتركز على تطوير الناس وتحقيق الاهداف المشتركة."}, {"id": 123, "type": "scenario", "tag": "Application", "text": "Scenario: A team member is performing well technically but their communication with clients is damaging relationships. As their leader, what do you do?", "opts": ["Reassign all their client work to someone else", "Have a coaching conversation focusing on the impact of their communication style and how to improve", "Tell them nothing - their technical work is too important", "Wait until the annual review to mention it"], "ans": 1, "exp": "A coaching conversation addressing specific behaviors and their impact is the correct approach. Be specific about what communication behaviors are causing issues, explain the business impact, and collaboratively develop an improvement plan.", "ar_exp": "محادثة التدريب التي تعالج السلوكيات التواصلية المحددة وتاثيرها هي النهج الصحيح. كن محددا حول ما يسبب المشاكل واشرح التاثير التجاري وضع خطة تحسين تعاونية."}, {"id": 124, "type": "mcq", "tag": "Goleman 6 Styles", "text": "A leader who personally demonstrates the work standard they expect and rewards only those who match it best reflects which style?", "opts": ["Coaching", "Affiliative", "Pacesetting", "Visionary"], "ans": 2, "exp": "Pacesetting. The Pacesetter leads by example - personally demonstrating the high standard they expect and expecting others to match it. Best for skilled teams; harmful for developing teams.", "ar_exp": "وضع الايقاع. يقود الشخص الذي يضع الايقاع بالمثال - يظهر شخصيا المعيار العالي الذي يتوقعه ويتوقع من الاخرين مجاراته. الافضل للفرق الماهرة؛ ضار للفرق النامية."}, {"id": 125, "type": "tf", "tag": "Situational Leadership", "text": "According to Situational Leadership, a leader should match their style to the team member's development level for each specific task.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. This is the fundamental principle of Situational Leadership. The development level is task-specific, and the leadership style should always match the D-level for that particular task.", "ar_exp": "صحيح. هذا هو المبدا الاساسي للقيادة الظرفية. مستوى التطور خاص بالمهمة، ويجب ان يتطابق اسلوب القيادة دائما مع مستوى D لتلك المهمة المحددة."}, {"id": 126, "type": "scenario", "tag": "Conflict Handling", "text": "Scenario: Two team members have been in a cold war for weeks, not speaking and impacting collaboration. Previous one-on-ones with each did not resolve it. What is the next step?", "opts": ["Transfer one of them to another team", "Facilitate a structured mediation session with both present focused on professional expectations", "Ignore it - they will resolve it eventually", "Escalate to HR immediately without any further leadership intervention"], "ans": 1, "exp": "After individual conversations fail, a structured mediation with both present is the right escalation. The focus should be on professional expectations and how to work together effectively going forward.", "ar_exp": "بعد فشل المحادثات الفردية، الوساطة المنظمة مع كليهما معا هي التصعيد الصحيح. يجب ان يركز على التوقعات المهنية وكيفية العمل معا بفعالية في المستقبل."}, {"id": 127, "type": "mcq", "tag": "Emotional Intelligence", "text": "Which of the following is a sign of low self-awareness in a leader?", "opts": ["Regularly seeking feedback from team members", "Being surprised when people react negatively to your behavior", "Knowing your trigger points and managing them proactively", "Acknowledging your mistakes openly"], "ans": 1, "exp": "Being consistently surprised by negative reactions to your behavior is a key sign of low self-awareness. It means you do not understand how your actions impact others - a blind spot that undermines leadership effectiveness.", "ar_exp": "الدهشة المستمرة من ردود الفعل السلبية على سلوكك هي علامة رئيسية على ضعف الوعي الذاتي. يعني ذلك انك لا تفهم كيف تؤثر افعالك على الاخرين."}, {"id": 128, "type": "tf", "tag": "Goleman 6 Styles", "text": "The Coaching leadership style (Goleman) prioritizes long-term development over short-term performance results.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. The Coaching style explicitly may sacrifice short-term performance for long-term growth. A coaching leader assigns stretch tasks, provides ongoing developmental feedback, and invests significant time in each person's growth.", "ar_exp": "صحيح. اسلوب التدريب قد يضحي صراحة بالاداء قصير المدى من اجل النمو بعيد المدى. يسند المدرب مهاما تمتد قدرات الفرد ويوفر تغذية راجعة تطويرية مستمرة."}, {"id": 129, "type": "mcq", "tag": "Application", "text": "Which leadership behavior is most likely to create a high-performance team culture?", "opts": ["Micromanaging every task", "Setting clear expectations, giving regular feedback, and developing team members consistently", "Praising all work equally regardless of quality", "Protecting the team from all difficult feedback"], "ans": 1, "exp": "High-performance culture is built on clarity, honest and regular feedback, and investment in people's development. Leaders who do these three things consistently create teams that are both highly capable and highly motivated.", "ar_exp": "الثقافة عالية الاداء مبنية على الوضوح والتغذية الراجعة الصادقة والمنتظمة والاستثمار في تطوير الناس. القادة الذين يقومون بهذه الامور الثلاثة باستمرار يخلقون فرقا ذات كفاءة ودافعية عالية."}, {"id": 130, "type": "mcq", "tag": "Foundation", "text": "What is the most accurate definition of influence in leadership?", "opts": ["Using positional power to force compliance", "The ability to affect others' thinking behavior or decisions without necessarily using authority", "Manipulating people through rewards and punishments", "Managing people's workloads and assignments"], "ans": 1, "exp": "Influence in leadership is the ability to affect how others think, feel, and act through communication, credibility, relationships, vision, and values - without necessarily using formal authority.", "ar_exp": "التاثير في القيادة هو القدرة على التاثير في تفكير الاخرين وسلوكهم وقراراتهم من خلال التواصل والمصداقية والعلاقات والرؤية والقيم - دون الاعتماد بالضرورة على السلطة الرسمية."}, {"id": 131, "type": "scenario", "tag": "Situational Leadership", "text": "Scenario: You delegate a major project to a D4 team member. Three weeks in, you realize they have been struggling silently with a new aspect outside their experience. What should you do?", "opts": ["Continue delegating - do not interfere", "Switch to S2 Coaching for this specific new aspect while maintaining S4 for the areas they know well", "Move them off the project entirely", "Send them on a training course and wait"], "ans": 1, "exp": "This is a perfect example of task-specific development levels. The team member is D4 on known aspects but D1 or D2 on the new unfamiliar part. Switch to S2 Coaching for that specific aspect while keeping S4 for everything else.", "ar_exp": "هذا مثال مثالي على مستويات التطور الخاصة بالمهمة. عضو الفريق D4 في الجوانب المعروفة لكن D1 او D2 في الجانب الجديد. انتقل الى S2 التدريب لذلك الجانب المحدد مع الاحتفاظ بـ S4 لكل شيء اخر."}, {"id": 132, "type": "tf", "tag": "Mindset", "text": "Praise that focuses on the process such as You worked really hard on this approach is more aligned with Growth mindset than praise focused on talent such as You are so smart.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Carol Dweck's research shows that process praise builds Growth mindset, while talent praise builds Fixed mindset because it implies intelligence is a fixed trait that performance can threaten.", "ar_exp": "صحيح. ابحاث كارول دويك تظهر ان ثناء العملية يبني العقلية النامية، بينما ثناء الموهبة يبني العقلية الثابتة لانه يلمّح الى ان الذكاء صفة ثابتة."}, {"id": 133, "type": "mcq", "tag": "Application", "text": "A leader who builds psychological safety in their team is most likely to see:", "opts": ["Less willingness to take risks", "More innovation, honesty, and learning from mistakes", "Reduced performance standards", "More conflict and disagreement"], "ans": 1, "exp": "Psychological safety leads to more innovation, more honest communication, and better learning from mistakes. All of these drive better long-term team performance.", "ar_exp": "السلامة النفسية تؤدي الى مزيد من الابتكار وتواصل اكثر صدقا وتعلم افضل من الاخطاء. كل هذه تدفع اداء الفريق على المدى البعيد."}, {"id": 134, "type": "mcq", "tag": "Goleman 6 Styles", "text": "Which Goleman style would be most appropriate when a team already knows what to do but could benefit from feeling more connected and appreciated?", "opts": ["Commanding", "Pacesetting", "Affiliative", "Coaching"], "ans": 2, "exp": "When the team is competent but morale or connection is lower than it should be, Affiliative is the right choice. Its focus on emotional bonds, appreciation, and people first re-energizes teams that are capable but emotionally disconnected.", "ar_exp": "حين يكون الفريق كفؤا لكن معنوياته اقل مما ينبغي، يكون التلاحم هو الاختيار الصحيح. تركيزه على الروابط العاطفية والتقدير والناس اولا ينشط الفرق القادرة لكن غير المتواصلة عاطفيا."}, {"id": 135, "type": "scenario", "tag": "Application", "text": "Scenario: You lead a team on a critical deadline. Halfway through you discover a team member has been making consistent errors requiring significant rework. The deadline is tomorrow. What do you do?", "opts": ["Ignore the errors to avoid conflict right before the deadline", "Switch temporarily to S1 Directing: clearly define what corrections are needed and closely supervise the rework", "Punish the team member publicly to motivate everyone", "Assign all the work to other team members without talking to the person making errors"], "ans": 1, "exp": "S1 Directing is appropriate when quality is failing and clear standards need to be urgently re-established. Clearly define the corrections, supervise closely, and address the issue directly. This is the Situational Leadership response to a sudden D1 situation created by performance failure.", "ar_exp": "S1 التوجيه مناسب حين يتراجع الجودة وتحتاج الى اعادة تاسيس معايير واضحة بشكل عاجل. حدد الاصلاحات المطلوبة واشرف عن كثب وعالج المشكلة مع الشخص المعني مباشرة."}, {"id": 136, "type": "tf", "tag": "Foundation", "text": "Leading by example is one of the most powerful ways to influence a team's behavior.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Modeling the behavior you want - showing up on time, communicating openly, owning mistakes - is one of the most powerful leadership tools. People watch what leaders DO far more than they listen to what leaders SAY.", "ar_exp": "صحيح. نمذجة السلوك الذي تريده - الالتزام بالمواعيد والتواصل بانفتاح وتملّك الاخطاء - هو احد اقوى ادوات القيادة. الناس يراقبون ما يفعله القادة اكثر بكثير مما يستمعون لما يقولونه."}, {"id": 137, "type": "mcq", "tag": "Emotional Intelligence", "text": "A leader who regularly gets angry and shouts at their team when under pressure is demonstrating poor:", "opts": ["Technical competence", "Strategic thinking", "Self-regulation", "Communication planning"], "ans": 2, "exp": "Poor self-regulation. Self-regulation is the EI component that involves managing disruptive emotions and impulses especially under stress. A leader who regularly loses composure creates fear and destroys psychological safety.", "ar_exp": "ضعف التنظيم الذاتي. التنظيم الذاتي هو مكون الذكاء العاطفي الذي يتضمن ادارة العواطف المعطلة خاصة تحت الضغط. القائد الذي يفقد هدوءه باستمرار يخلق الخوف ويدمر الامان النفسي."}, {"id": 138, "type": "mcq", "tag": "Foundation", "text": "Which of the following is a characteristic of a servant leader?", "opts": ["Prioritizing personal status and recognition", "Focusing first on the needs and development of their team", "Making all major decisions unilaterally", "Focusing exclusively on short-term results"], "ans": 1, "exp": "A servant leader puts the team's needs, growth, and wellbeing first. They ask how can I remove obstacles and develop my people rather than how can I achieve my goals. Servant leadership is associated with high team loyalty.", "ar_exp": "القائد الخادم يضع احتياجات الفريق ونموه ورفاهيته في المقام الاول. يسال: كيف ازيل العقبات واطور موظفيي؟ بدلا من: كيف احقق اهدافي؟"}, {"id": 139, "type": "scenario", "tag": "Goleman 6 Styles", "text": "Scenario: You are the leader of a team that has just successfully completed a difficult project. The team is exhausted but proud. What is the best approach now?", "opts": ["Immediately assign the next project to maintain momentum", "Use Affiliative style: celebrate the success, acknowledge each person, and give the team time to recover", "Use Pacesetting to push for even higher performance immediately", "Give no feedback and wait for the next review cycle"], "ans": 1, "exp": "After a demanding effort, the team needs to feel recognized and appreciated before diving into the next challenge. Affiliative - celebrating success and showing care for wellbeing - maintains motivation and builds loyalty.", "ar_exp": "بعد جهد مرهق، يحتاج الفريق الى الاعتراف والتقدير قبل الغوص في التحدي التالي. التلاحم - الاحتفال بالنجاح واظهار الاهتمام بالرفاهية - يحافظ على الدافعية ويبني الولاء على المدى البعيد."}, {"id": 140, "type": "mcq", "tag": "Situational Leadership", "text": "In Situational Leadership, D4 is defined as:", "opts": ["Low competence, high commitment", "Some competence, low commitment", "High competence, variable commitment", "High competence, high commitment"], "ans": 3, "exp": "D4 = High competence + High commitment. These are experienced, self-motivated, confident team members who can be fully trusted with ownership and autonomy. The matching leadership style is S4 Delegating.", "ar_exp": "D4 = كفاءة عالية + التزام عال. هؤلاء هم اعضاء الفريق المتمرسون المحفزون ذاتيا الواثقون الذين يمكن الوثوق بهم بالكامل بالملكية والاستقلالية. الاسلوب المناسب هو S4 التفويض."}, {"id": 141, "type": "tf", "tag": "Resilience", "text": "A leader demonstrating accountability would say The team failed to execute correctly rather than I should have given clearer direction and support.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. The team failed is blame-shifting. A truly accountable leader says I should have given clearer direction - taking ownership of their role in the outcome. Accountable leaders look inward first before looking outward.", "ar_exp": "خطا. 'الفريق اخفق في التنفيذ' هو الاء للوم. القائد المحاسَب حقا يقول 'كان يجب ان اعطي توجيها اوضح' - متحملا مسؤولية دوره في النتيجة. القادة المسؤولون ينظرون الى الداخل اولا."}, {"id": 142, "type": "mcq", "tag": "Application", "text": "Which leadership behavior is LEAST effective for building long-term team engagement?", "opts": ["Providing regular positive and developmental feedback", "Recognizing individual and team achievements", "Micromanaging every step of team members' work", "Creating space for team members to develop new skills"], "ans": 2, "exp": "Micromanaging is consistently associated with lower engagement, reduced autonomy, less creativity, and higher turnover. Long-term engagement is built through autonomy, growth, recognition, and meaningful work.", "ar_exp": "الادارة التفصيلية مرتبطة باستمرار بمشاركة اقل وحرية اقل وابداع اقل ودوران اعلى. المشاركة على المدى البعيد مبنية على الاستقلالية والنمو والاعتراف والعمل ذي المعنى."}, {"id": 143, "type": "tf", "tag": "Goleman 6 Styles", "text": "Goleman's 6 leadership styles are all rooted in Emotional Intelligence (EI) competencies.", "opts": ["True", "False"], "ans": 0, "exp": "TRUE. Each of Goleman's 6 styles draws on specific EI competencies. Commanding uses self-control and initiative. Visionary uses empathy and self-confidence. Affiliative uses empathy and communication. Democratic uses collaboration. Pacesetting uses initiative. Coaching uses empathy and self-awareness.", "ar_exp": "صحيح. يستند كل اسلوب من اساليب غولمان الستة الى كفاءات محددة في الذكاء العاطفي: الاوامر (التحكم بالنفس والمبادرة)، الرؤيوي (التعاطف والثقة)، التلاحم (التعاطف والتواصل)، الديمقراطي (التعاون)، وضع الايقاع (المبادرة)، التدريب (التعاطف والوعي الذاتي)."}, {"id": 144, "type": "scenario", "tag": "Application", "text": "Scenario: You have a team member who is very experienced but often works alone and does not share knowledge with the team. This creates a knowledge silo risk. How do you address this?", "opts": ["Force them to share knowledge by making it a performance metric immediately", "Have a coaching conversation to understand their perspective, explain the team impact, and find ways for them to share knowledge they are comfortable with", "Ignore it - their individual performance is excellent", "Transfer their responsibilities to team members gradually without telling them"], "ans": 1, "exp": "A coaching conversation first allows you to understand WHY they work alone, explain the impact on the team, and find a solution they can own. Making it a sudden metric without dialogue creates resentment.", "ar_exp": "محادثة التدريب اولا تتيح لك فهم لماذا يعملون بشكل منعزل، وشرح التاثير على الفريق، وايجاد حل يمكنهم تملّكه. جعله مقياسا فجائيا دون حوار يخلق استياء."}, {"id": 145, "type": "mcq", "tag": "Mindset", "text": "Which of the following statements reflects a Fixed mindset?", "opts": ["I do not understand this yet but if I keep working on it I will figure it out", "I failed this presentation because I am just not a good public speaker and never will be", "This is challenging which means I am about to learn something important", "Feedback is useful data for me to improve"], "ans": 1, "exp": "I am just not a good public speaker and never will be is a Fixed mindset statement. It treats ability as permanent and unchangeable. Growth mindset would say I am not a strong public speaker yet but I can improve with practice.", "ar_exp": "'انا لستُ متحدثا عموميا جيدا ولن اكون كذلك ابدا' هو تصريح بعقلية ثابتة. يعامل القدرة كامر دائم لا يتغير. ستقول العقلية النامية: 'لستُ متحدثا قويا بعد، لكن يمكنني التحسن.'"}, {"id": 146, "type": "mcq", "tag": "Foundation", "text": "The concept of leading without authority is most relevant when:", "opts": ["You are the most senior person in the room", "You want to influence outcomes or others without relying on your formal position", "You want to avoid taking responsibility for decisions", "You are managing a purely technical project with no team involved"], "ans": 1, "exp": "Leading without authority is most relevant when you want to drive change, influence people, or achieve goals without relying on your job title. It applies to individual contributors, cross-functional work, and anyone who wants impact beyond their formal role.", "ar_exp": "القيادة بدون سلطة اكثر صلة حين تريد دفع التغيير او التاثير في الناس او تحقيق الاهداف دون الاعتماد على مسماك الوظيفي. تنطبق على المساهمين الفرديين والعمل متعدد الوظائف."}, {"id": 147, "type": "tf", "tag": "Situational Leadership", "text": "The same leader behavior that works perfectly with a D1 employee will also work well with a D3 employee doing the same task.", "opts": ["True", "False"], "ans": 1, "exp": "FALSE. S1 Directing for D1 involves high task direction and close supervision. Applying this to a D3 employee would feel like micromanagement, undermine their confidence, and worsen their motivation. D3 needs S3 Supporting.", "ar_exp": "خطا. تطبيق S1 التوجيه على موظف D3 سيبدو كادارة تفصيلية ويضعف ثقته ويزيد تراجع دافعيته. D3 يحتاج S3 الدعم وليس S1 التوجيه."}, {"id": 148, "type": "mcq", "tag": "Goleman 6 Styles", "text": "A leader who shares decision-making power, builds consensus, and values every team member's input most reflects which style?", "opts": ["Pacesetting", "Commanding", "Democratic", "Coaching"], "ans": 2, "exp": "Democratic. This style builds consensus through shared decision-making and values everyone's input. Key phrase: What do you think? Best used with capable, motivated teams and complex decisions that benefit from diverse perspectives.", "ar_exp": "الديمقراطي. يبني هذا الاسلوب الاجماع من خلال صنع القرار المشترك ويقدّر مدخلات الجميع. عبارته المميزة: 'ما رايك؟' الافضل للفرق ذات الكفاءة والدافعية."}, {"id": 149, "type": "scenario", "tag": "Application", "text": "Scenario: You have just been promoted to lead a team you were previously a peer member of. Some team members are struggling to accept your new authority. How should you approach this transition?", "opts": ["Use Commanding immediately to establish authority", "Ignore the dynamics and act as if nothing has changed", "Use a combination of Visionary to share your direction and Democratic to involve them in shaping how the team works", "Avoid all decisions for the first month to seem approachable"], "ans": 2, "exp": "Transitioning from peer to leader requires earning trust not demanding it. Share your vision (Visionary) to give direction AND involve them in shaping team norms (Democratic) to honor their experience. This combination builds credibility and willing followership.", "ar_exp": "الانتقال من الزميل الى القائد يتطلب كسب الثقة وليس المطالبة بها. شارك رؤيتك واهدافك (رؤيوي) لاعطائهم اتجاها واشركهم في تشكيل معايير الفريق (ديمقراطي) لتكريم خبراتهم."}, {"id": 150, "type": "mcq", "tag": "Application", "text": "Which of the following BEST summarizes the core principle of effective leadership as covered across all modules?", "opts": ["Leadership is about having the right title and authority to direct people", "Leadership is about adapting your style to develop people, build trust, and achieve shared goals through influence", "Leadership is about enforcing standards and ensuring compliance at all times", "Leadership is a fixed skill you either have or do not have from birth"], "ans": 1, "exp": "Effective leadership across all modules comes down to: adapting your style to the situation and person, developing people's capabilities and confidence, building trust through authenticity and empathy, and achieving goals through influence - not just authority or compliance.", "ar_exp": "القيادة الفعالة عبر جميع الوحدات تتلخص في: تكييف اسلوبك مع الظرف والشخص، وتطوير قدرات الناس وثقتهم، وبناء الثقة من خلال الاصالة والتعاطف، وتحقيق الاهداف من خلال التاثير وليس فقط السلطة."}];
var answered={},revealed={},totalAnswered=0,totalCorrect=0,currentFilter="all";
var TAGS=[...new Set(QS.map(function(q){return q.tag}))];

function filterMap(f){
  if(f==="all") return QS;
  if(f==="mcq"||f==="tf"||f==="scenario") return QS.filter(function(q){return q.type===f});
  return QS.filter(function(q){return q.tag===f});
}

function render(f){
  currentFilter=f||"all";
  var list=filterMap(currentFilter);
  var c=document.getElementById("q-container");
  c.innerHTML="";
  if(!list.length){c.innerHTML="<p style='color:var(--text-muted);padding:20px 0'>No questions in this category.</p>";return;}
  var lbl=document.createElement("div");lbl.className="q-group-label";
  lbl.textContent=currentFilter==="all"?"All Questions ("+QS.length+")":
    currentFilter==="mcq"?"Multiple Choice Questions":
    currentFilter==="tf"?"True / False Questions":
    currentFilter==="scenario"?"Scenario-Based Questions":currentFilter+" Questions";
  c.appendChild(lbl);
  for(var i=0;i<list.length;i++) c.appendChild(buildCard(list[i]));
}

function buildCard(q){
  var card=document.createElement("div");
  card.className="q-card";card.id="card-"+q.id;
  var tl=q.type==="mcq"?"MCQ":q.type==="tf"?"T / F":"Scenario";
  var tc=q.type==="mcq"?"badge-mcq":q.type==="tf"?"badge-tf":"badge-scenario";
  var top=document.createElement("div");top.className="q-card-top";
  var meta=document.createElement("div");meta.className="q-meta";
  meta.innerHTML='<span class="q-num-badge">Q'+q.id+'</span>'
    +'<span class="q-type-badge '+tc+'">'+tl+'</span>'
    +'<span class="q-tag">'+q.tag+'</span>'
    +'<span class="result-icon" id="icon-'+q.id+'"></span>';
  var qt=document.createElement("div");qt.className="q-text";qt.textContent=q.text;
  top.appendChild(meta);top.appendChild(qt);card.appendChild(top);

  if(q.type==="tf"){
    var td=document.createElement("div");td.className="tf-options";
    q.opts.forEach(function(o,i){
      var b=document.createElement("button");b.className="tf-btn";b.textContent=o;
      b.setAttribute("data-idx",i);b.setAttribute("data-qid",q.id);
      b.onclick=function(){selectAnswer(q.id,i);};
      td.appendChild(b);
    });
    card.appendChild(td);
  }else{
    var od=document.createElement("div");od.className="q-options";
    var ks=["a","b","c","d"];
    q.opts.forEach(function(o,i){
      var b=document.createElement("button");b.className="opt-btn";
      b.setAttribute("data-idx",i);b.setAttribute("data-qid",q.id);
      b.innerHTML='<span class="opt-letter">'+ks[i]+'</span><span>'+o+'</span>';
      b.onclick=function(){selectAnswer(q.id,i);};
      od.appendChild(b);
    });
    card.appendChild(od);
  }

  // Show Answer button
  var act=document.createElement("div");act.className="q-actions";
  var sb=document.createElement("button");sb.className="show-ans-btn";
  sb.id="showbtn-"+q.id;sb.textContent="Show Answer";
  sb.onclick=function(){toggleAnswer(q.id);};
  act.appendChild(sb);card.appendChild(act);

  // Answer block with EN/AR toggle inside
  var ks2=["a","b","c","d"];
  var correctText=q.type==="tf"?(q.ans===0?"TRUE":"FALSE"):ks2[q.ans].toUpperCase()+". "+q.opts[q.ans];

  var ad=document.createElement("div");ad.className="q-answer";ad.id="ans-"+q.id;
  ad.innerHTML=
    '<div class="ans-lang-bar">'
      +'<button class="ans-lang-btn active" id="btn-en-'+q.id+'" onclick="switchAnsLang('+q.id+',\'en\')">EN</button>'
      +'<button class="ans-lang-btn" id="btn-ar-'+q.id+'" onclick="switchAnsLang('+q.id+',\'ar\')">&#1593;&#1585;&#1576;&#1610;</button>'
    +'</div>'
    +'<div class="ans-body">'
      +'<div class="ans-label">&#10003; Correct Answer: '+correctText+'</div>'
      +'<div class="ans-text-en" id="exp-en-'+q.id+'">'+q.exp+'</div>'
      +'<div class="ans-text-ar" id="exp-ar-'+q.id+'">'+q.ar_exp+'</div>'
    +'</div>';
  card.appendChild(ad);

  if(answered.hasOwnProperty(q.id)) applyAnswerState(q,card,answered[q.id]);
  if(revealed[q.id]){ad.classList.add("open");sb.textContent="Hide Answer";}
  return card;
}

function switchAnsLang(qid,lang){
  var enBtn=document.getElementById("btn-en-"+qid);
  var arBtn=document.getElementById("btn-ar-"+qid);
  var enTxt=document.getElementById("exp-en-"+qid);
  var arTxt=document.getElementById("exp-ar-"+qid);
  if(!enBtn||!arBtn||!enTxt||!arTxt) return;
  if(lang==="ar"){
    enBtn.classList.remove("active");arBtn.classList.add("active");
    enTxt.style.display="none";arTxt.style.display="block";
  }else{
    arBtn.classList.remove("active");enBtn.classList.add("active");
    arTxt.style.display="none";enTxt.style.display="block";
  }
}

function selectAnswer(qid,idx){
  if(answered.hasOwnProperty(qid)) return;
  var q=null;for(var i=0;i<QS.length;i++){if(QS[i].id===qid){q=QS[i];break;}}
  if(!q) return;
  var isCorrect=(idx===q.ans);
  answered[qid]=isCorrect;totalAnswered++;
  if(isCorrect) totalCorrect++;
  var card=document.getElementById("card-"+qid);
  if(!isCorrect){
    var cb=card.querySelector("[data-idx='"+idx+"']");
    if(cb) cb.classList.add("wrong");
  }
  applyAnswerState(q,card,isCorrect);
  if(!isCorrect){
    var ad=document.getElementById("ans-"+qid);
    var sb=document.getElementById("showbtn-"+qid);
    if(ad&&!revealed[qid]){ad.classList.add("open");revealed[qid]=true;if(sb)sb.textContent="Hide Answer";}
  }
  updateProgress();
}

function applyAnswerState(q,card,isCorrect){
  card.classList.add(isCorrect?"answered-correct":"answered-wrong");
  var icon=document.getElementById("icon-"+q.id);
  if(icon){icon.textContent=isCorrect?"\u2713":"\u2717";icon.style.color=isCorrect?"#3aab65":"#d45050";}
  var allBtns=card.querySelectorAll(".opt-btn,.tf-btn");
  allBtns.forEach(function(b){
    b.disabled=true;
    var i=parseInt(b.getAttribute("data-idx"),10);
    if(i===q.ans) b.classList.add("revealed-correct");
  });
}

function toggleAnswer(qid){
  var ad=document.getElementById("ans-"+qid);
  var sb=document.getElementById("showbtn-"+qid);
  if(!ad) return;
  if(ad.classList.contains("open")){
    ad.classList.remove("open");revealed[qid]=false;
    if(sb) sb.textContent="Show Answer";
  }else{
    ad.classList.add("open");revealed[qid]=true;
    if(sb) sb.textContent="Hide Answer";
    var q=null;for(var i=0;i<QS.length;i++){if(QS[i].id===qid){q=QS[i];break;}}
    var card=document.getElementById("card-"+qid);
    if(q&&card){card.querySelectorAll(".opt-btn,.tf-btn").forEach(function(b){if(parseInt(b.getAttribute("data-idx"),10)===q.ans) b.classList.add("revealed-correct");});}
  }
}

function updateProgress(){
  var fill=document.getElementById("prog-fill");
  var txt=document.getElementById("prog-txt");
  var ctxt=document.getElementById("prog-correct-txt");
  var hs=document.getElementById("hdr-score"),ht=document.getElementById("hdr-total"),hp=document.getElementById("hdr-pct");
  var pct=Math.round((totalAnswered/QS.length)*100);
  if(fill) fill.style.width=pct+"%";
  if(txt) txt.textContent=totalAnswered+" / "+QS.length+" answered";
  if(ctxt) ctxt.textContent=totalCorrect+" correct ("+(totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):0)+"%)";
  if(hs) hs.textContent=totalCorrect;
  if(ht) ht.textContent=totalAnswered;
  if(hp) hp.textContent=totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):"-";
}

function filterQ(f,btn){
  document.querySelectorAll(".f-tab").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");render(f);
}

function toggleTheme(){
  var h=document.documentElement,b=document.getElementById("theme-btn");
  if(h.dataset.theme==="light"){h.dataset.theme="dark";b.textContent="Light";}
  else{h.dataset.theme="light";b.textContent="Dark";}
}

window.addEventListener("scroll",function(){
  var b=document.getElementById("scrollBtn");
  if(b) b.classList.toggle("visible",window.scrollY>400);
});

function buildFilters(){
  var row=document.getElementById("filter-row");
  TAGS.forEach(function(tag){
    var btn=document.createElement("button");
    btn.className="f-tab";btn.textContent=tag;
    btn.onclick=function(){filterQ(tag,btn);};
    row.appendChild(btn);
  });
}

buildFilters();
render("all");
updateProgress();
</script>
</body>
</html>
